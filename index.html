<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#160e2e" />
  <title>Starfall Garden — Bloom. Blast. Enchant.</title>
  <!-- Favicon — prevents browser 404 noise. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23160e2e'/><text x='16' y='24' text-anchor='middle' font-size='20'>🌙</text></svg>">
  <!-- CrazyGames SDK v3. Loaded async so it does not block Phaser startup.
       SDKBridge.init() polls briefly for the SDK to appear before falling
       back to stub mode, so production play on CrazyGames still works. -->
  <script async src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 25% 25%, rgba(124, 201, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 75%, rgba(185, 140, 255, 0.05) 0%, transparent 50%),
        #160e2e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
    }
    /* ==========================================================================
     * HTML preloader (Starfall Garden — moonlit loading). Shown before Phaser scenes
     * start; faded then removed by BootScene once the asset load + save
     * migration is complete.
     *
     * Contract preserved: BootScene/main.ts manipulate these IDs/classes —
     *   #nfr-preload                  (root; .fading triggers exit anim)
     *   #nfr-preload-bar-fill         (BootScene sets style.width = "X%")
     *   #nfr-preload-status           (status text)
     *   #nfr-preload-recover          (watchdog UI, .is-visible to show)
     *   #nfr-preload-recover-btn      (reload button)
     * ========================================================================== */
    #nfr-preload {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at center, rgba(124, 201, 255, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 30%, rgba(185, 140, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 215, 90, 0.05) 0%, transparent 55%),
        #160e2e;
      color: #7cc9ff;
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
      overflow: hidden;
    }
    /* Drifting starlight lattice — two soft layers crossing slowly. */
    #nfr-preload::before {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          45deg,
          transparent 0,
          transparent 38px,
          rgba(124, 201, 255, 0.06) 38px,
          rgba(124, 201, 255, 0.06) 39px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent 0,
          transparent 38px,
          rgba(185, 140, 255, 0.05) 38px,
          rgba(185, 140, 255, 0.05) 39px
        );
      animation: nfr-pre-grid 24s linear infinite;
    }
    #nfr-preload::after {
      /* Faint horizontal light rays over everything for a dreamy read. */
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(124, 201, 255, 0.045) 0,
        rgba(124, 201, 255, 0.045) 1px,
        transparent 1px,
        transparent 3px
      );
    }
    @keyframes nfr-pre-grid {
      0%   { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(56px, 56px, 0); }
    }
    #nfr-preload.fading {
      opacity: 0;
      pointer-events: none;
    }

    /* ---- Title (typewriter) ------------------------------------------------ */
    #nfr-preload-title {
      position: relative;
      font-family: "Quicksand", "Nunito", system-ui, sans-serif;
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #7cc9ff;
      text-shadow:
        0 0 8px rgba(124, 201, 255, 0.95),
        0 0 22px rgba(124, 201, 255, 0.65),
        0 0 44px rgba(124, 201, 255, 0.35),
        0 0 64px rgba(185, 140, 255, 0.30);
      margin: 0 0 10px 0;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      max-width: 100%;
      border-right: 2px solid rgba(124, 201, 255, 0.95);
      animation:
        nfr-pre-type 0.6s steps(15, end) forwards,
        nfr-pre-caret 0.85s steps(2, end) infinite;
    }
    @keyframes nfr-pre-type {
      from { width: 0; }
      to   { width: 15ch; }
    }
    @keyframes nfr-pre-caret {
      0%, 49%   { border-right-color: rgba(124, 201, 255, 0.95); }
      50%, 100% { border-right-color: transparent; }
    }

    /* ---- Subtitle (SYSTEM INIT lines, staggered) --------------------------- */
    .nfr-preload-init {
      margin: 0 0 28px 0;
      padding: 0;
      list-style: none;
      font-size: clamp(10px, 1.4vw, 13px);
      color: rgba(124, 201, 255, 0.78);
      letter-spacing: 0.20em;
      text-align: left;
      min-width: clamp(240px, 36vw, 360px);
    }
    .nfr-preload-init li {
      opacity: 0;
      transform: translateY(4px);
      animation: nfr-pre-line 0.45s ease-out forwards;
      margin: 4px 0;
      display: flex;
      gap: 10px;
    }
    .nfr-preload-init li::before {
      content: ">";
      color: #b98cff;
      text-shadow: 0 0 6px rgba(185, 140, 255, 0.7);
    }
    .nfr-preload-init li:nth-child(1) { animation-delay: 0.62s; }
    .nfr-preload-init li:nth-child(2) { animation-delay: 0.92s; }
    .nfr-preload-init li:nth-child(3) { animation-delay: 1.22s; }
    @keyframes nfr-pre-line {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Segmented progress bar ------------------------------------------- */
    #nfr-preload-bar {
      position: relative;
      width: clamp(240px, 52vw, 440px);
      height: 14px;
      background: rgba(124, 201, 255, 0.08);
      border: 1px solid rgba(124, 201, 255, 0.70);
      box-shadow:
        inset 0 0 8px rgba(124, 201, 255, 0.18),
        0 0 14px rgba(124, 201, 255, 0.25);
      overflow: hidden;
      padding: 2px;
    }
    #nfr-preload-bar-fill {
      position: relative;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7cc9ff 0%, #a6dcff 60%, #ffffff 100%);
      box-shadow: 0 0 14px rgba(124, 201, 255, 0.95);
      transition: width 0.25s ease-out;
      /* Segmented cells via repeating gradient mask (20 cells across 100%). */
      -webkit-mask-image: repeating-linear-gradient(
        90deg,
        #000 0,
        #000 calc(5% - 2px),
        transparent calc(5% - 2px),
        transparent 5%
      );
              mask-image: repeating-linear-gradient(
        90deg,
        #000 0,
        #000 calc(5% - 2px),
        transparent calc(5% - 2px),
        transparent 5%
      );
    }
    #nfr-preload-status {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(124, 201, 255, 0.70);
      letter-spacing: 0.30em;
      text-transform: uppercase;
    }
    /* Stuck-loading watchdog UI (playbook §10.6). Hidden until the
       watchdog fires; surfaces a reload affordance so a busted CDN /
       script / iframe handshake doesn't strand the player on the bar. */
    #nfr-preload-recover {
      margin-top: 22px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #nfr-preload-recover.is-visible {
      display: flex;
    }
    #nfr-preload-recover-msg {
      font-size: 12px;
      color: rgba(255, 215, 90, 0.95);
      letter-spacing: 0.12em;
      max-width: clamp(220px, 60vw, 460px);
      text-align: center;
      line-height: 1.5;
    }
    #nfr-preload-recover-btn {
      background: rgba(124, 201, 255, 0.16);
      color: #7cc9ff;
      border: 1px solid rgba(124, 201, 255, 0.85);
      padding: 8px 22px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.18em;
      cursor: pointer;
      text-shadow: 0 0 8px rgba(124, 201, 255, 0.6);
    }
    #nfr-preload-recover-btn:hover {
      background: rgba(124, 201, 255, 0.28);
    }
    @media (prefers-reduced-motion: reduce) {
      #nfr-preload::before { animation: none; }
      #nfr-preload-title {
        animation: none;
        width: auto;
        border-right: 0;
      }
      .nfr-preload-init li {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="nfr-preload">
    <h1 id="nfr-preload-title">STARFALL GARDEN</h1>
    <ul class="nfr-preload-init">
      <li>WAKING THE GARDEN</li>
      <li>GATHERING MOONLIGHT</li>
      <li>SCATTERING STARDUST</li>
    </ul>
    <div id="nfr-preload-bar"><div id="nfr-preload-bar-fill"></div></div>
    <div id="nfr-preload-status">LOADING&hellip;</div>
    <div id="nfr-preload-recover">
      <div id="nfr-preload-recover-msg">
        Loading is taking longer than expected.<br/>
        This usually means a cached file or the platform SDK is misbehaving.
      </div>
      <button id="nfr-preload-recover-btn" type="button">RELOAD</button>
    </div>
  </div>
  <div id="game"></div>
  <script>
    // Stuck-loading watchdog (playbook §10.6). If the preloader is still
    // visible 12 seconds after page load, surface a reload button. Boot
    // success removes the #nfr-preload node, which is what cancels this.
    (function () {
      var btn = document.getElementById('nfr-preload-recover-btn');
      if (btn) {
        btn.addEventListener('click', function () {
          try { window.location.reload(); } catch (_) { /* no-op */ }
        });
      }
      setTimeout(function () {
        var node = document.getElementById('nfr-preload');
        var recover = document.getElementById('nfr-preload-recover');
        if (node && recover && !node.classList.contains('fading')) {
          recover.classList.add('is-visible');
          // Best-effort analytics ping. CrazyGames SDK may not be ready yet;
          // we try the public surface and swallow any throw.
          try {
            var sdk = (window.CrazyGames || {}).SDK;
            if (sdk && sdk.analytics && typeof sdk.analytics.trackEvent === 'function') {
              sdk.analytics.trackEvent('preload_stuck', { elapsedSec: 12 });
            }
          } catch (_) { /* SDK not yet usable; recover UI is the actual fix. */ }
        }
      }, 12000);
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
