<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#160e2e" />
  <title>Starfall Garden — Bloom. Blast. Enchant.</title>
  <!-- Favicon — prevents browser 404 noise. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23160e2e'/><text x='16' y='24' text-anchor='middle' font-size='20'>🌙</text></svg>">
  <!-- CrazyGames SDK v3. Loaded async so it does not block Phaser startup.
       SDKBridge.init() polls briefly for the SDK to appear before falling
       back to stub mode, so production play on CrazyGames still works. -->
  <script async src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 25% 25%, rgba(124, 201, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 75%, rgba(185, 140, 255, 0.05) 0%, transparent 50%),
        #160e2e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
    }
    /* ==========================================================================
     * HTML preloader (Starfall Garden — moonlit loading). Shown before Phaser scenes
     * start; faded then removed by BootScene once the asset load + save
     * migration is complete.
     *
     * Contract preserved: BootScene/main.ts manipulate these IDs/classes —
     *   #nfr-preload                  (root; .fading triggers exit anim)
     *   #nfr-preload-bar-fill         (BootScene sets style.width = "X%")
     *   #nfr-preload-status           (status text)
     *   #nfr-preload-recover          (watchdog UI, .is-visible to show)
     *   #nfr-preload-recover-btn      (reload button)
     * ========================================================================== */
    #nfr-preload {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 50% 32%, rgba(124, 201, 255, 0.16) 0%, transparent 60%),
        radial-gradient(ellipse at 18% 78%, rgba(185, 140, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 82% 72%, rgba(255, 215, 90, 0.08) 0%, transparent 55%),
        linear-gradient(180deg, #241a52 0%, #160e2e 100%);
      color: #eaf4ff;
      font-family: "Quicksand", "Nunito", system-ui, -apple-system, sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
      overflow: hidden;
    }
    /* Soft drifting twinkles instead of a techy grid lattice. */
    #nfr-preload::before {
      content: "";
      position: absolute;
      inset: -10%;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.9), transparent 60%),
        radial-gradient(2px 2px at 70% 20%, rgba(190, 240, 255, 0.85), transparent 60%),
        radial-gradient(1.5px 1.5px at 40% 72%, rgba(255, 255, 255, 0.7), transparent 60%),
        radial-gradient(2px 2px at 85% 62%, rgba(255, 225, 150, 0.85), transparent 60%),
        radial-gradient(1.5px 1.5px at 55% 46%, rgba(205, 180, 255, 0.75), transparent 60%),
        radial-gradient(2px 2px at 12% 58%, rgba(255, 255, 255, 0.65), transparent 60%),
        radial-gradient(1.5px 1.5px at 90% 36%, rgba(190, 240, 255, 0.65), transparent 60%),
        radial-gradient(1.5px 1.5px at 33% 18%, rgba(255, 225, 150, 0.6), transparent 60%);
      animation: nfr-pre-twinkle 5.5s ease-in-out infinite alternate;
    }
    @keyframes nfr-pre-twinkle {
      0%   { opacity: 0.5; }
      100% { opacity: 1; }
    }
    #nfr-preload.fading {
      opacity: 0;
      pointer-events: none;
    }

    /* ---- Title ------------------------------------------------------------- */
    #nfr-preload-title {
      position: relative;
      font-family: "Quicksand", "Nunito", system-ui, sans-serif;
      font-size: clamp(30px, 6.5vw, 58px);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #f1f8ff;
      text-shadow:
        0 0 10px rgba(124, 201, 255, 0.9),
        0 0 26px rgba(185, 140, 255, 0.6),
        0 0 52px rgba(255, 215, 90, 0.28);
      margin: 0 0 6px 0;
      text-align: center;
      max-width: 92%;
      animation: nfr-pre-rise 0.7s ease-out both, nfr-pre-glow 3.2s ease-in-out 0.7s infinite;
    }
    @keyframes nfr-pre-rise {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes nfr-pre-glow {
      0%, 100% { text-shadow: 0 0 10px rgba(124, 201, 255, 0.9), 0 0 26px rgba(185, 140, 255, 0.55), 0 0 52px rgba(255, 215, 90, 0.25); }
      50%      { text-shadow: 0 0 16px rgba(124, 201, 255, 1), 0 0 38px rgba(185, 140, 255, 0.75), 0 0 66px rgba(255, 215, 90, 0.42); }
    }
    #nfr-preload-tagline {
      font-family: "Quicksand", "Nunito", system-ui, sans-serif;
      font-size: clamp(11px, 2vw, 15px);
      font-weight: 600;
      letter-spacing: 0.34em;
      color: rgba(205, 180, 255, 0.92);
      margin: 0 0 24px 0;
      animation: nfr-pre-rise 0.7s ease-out 0.15s both;
    }

    /* ---- Init lines (cozy, staggered) ------------------------------------- */
    .nfr-preload-init {
      margin: 0 0 26px 0;
      padding: 0;
      list-style: none;
      font-family: "Nunito", "Quicksand", system-ui, sans-serif;
      font-size: clamp(11px, 1.5vw, 14px);
      font-weight: 600;
      color: rgba(222, 236, 255, 0.85);
      letter-spacing: 0.08em;
      text-align: left;
    }
    .nfr-preload-init li {
      opacity: 0;
      transform: translateY(4px);
      animation: nfr-pre-line 0.5s ease-out forwards;
      margin: 5px 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .nfr-preload-init li::before {
      content: "\2726"; /* ✦ sparkle */
      color: #ffd75a;
      text-shadow: 0 0 8px rgba(255, 215, 90, 0.8);
    }
    .nfr-preload-init li:nth-child(1) { animation-delay: 0.5s; }
    .nfr-preload-init li:nth-child(2) { animation-delay: 0.8s; }
    .nfr-preload-init li:nth-child(3) { animation-delay: 1.1s; }
    @keyframes nfr-pre-line {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Progress bar (rounded candy pill) -------------------------------- */
    #nfr-preload-bar {
      position: relative;
      width: clamp(240px, 52vw, 440px);
      height: 16px;
      background: rgba(20, 12, 40, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(20, 10, 40, 0.4), inset 0 1px 3px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      padding: 2px;
    }
    #nfr-preload-bar-fill {
      position: relative;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7cc9ff 0%, #b98cff 55%, #ffd75a 100%);
      box-shadow: 0 0 14px rgba(124, 201, 255, 0.8);
      transition: width 0.3s ease-out;
    }
    #nfr-preload-status {
      margin-top: 16px;
      font-family: "Quicksand", "Nunito", system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(222, 236, 255, 0.78);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }
    /* Stuck-loading watchdog UI (playbook §10.6). Hidden until the
       watchdog fires; surfaces a reload affordance so a busted CDN /
       script / iframe handshake doesn't strand the player on the bar. */
    #nfr-preload-recover {
      margin-top: 22px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #nfr-preload-recover.is-visible {
      display: flex;
    }
    #nfr-preload-recover-msg {
      font-family: "Nunito", "Quicksand", system-ui, sans-serif;
      font-size: 13px;
      color: rgba(255, 215, 90, 0.95);
      letter-spacing: 0.04em;
      max-width: clamp(220px, 60vw, 460px);
      text-align: center;
      line-height: 1.5;
    }
    #nfr-preload-recover-btn {
      background: linear-gradient(180deg, #7fd0ff 0%, #4aa6ea 100%);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 26px;
      font-family: "Quicksand", "Nunito", system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.10em;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(40, 90, 140, 0.55), 0 8px 16px rgba(20, 10, 40, 0.3);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }
    #nfr-preload-recover-btn:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }
    @media (prefers-reduced-motion: reduce) {
      #nfr-preload::before { animation: none; }
      #nfr-preload-title { animation: none; }
      #nfr-preload-tagline,
      .nfr-preload-init li {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="nfr-preload">
    <h1 id="nfr-preload-title">🌙 Starfall Garden</h1>
    <div id="nfr-preload-tagline">BLOOM &middot; BLAST &middot; ENCHANT</div>
    <ul class="nfr-preload-init">
      <li>Waking the garden</li>
      <li>Gathering moonlight</li>
      <li>Scattering stardust</li>
    </ul>
    <div id="nfr-preload-bar"><div id="nfr-preload-bar-fill"></div></div>
    <div id="nfr-preload-status">Loading&hellip;</div>
    <div id="nfr-preload-recover">
      <div id="nfr-preload-recover-msg">
        Loading is taking longer than expected.<br/>
        This usually means a cached file or the platform SDK is misbehaving.
      </div>
      <button id="nfr-preload-recover-btn" type="button">RELOAD</button>
    </div>
  </div>
  <div id="game"></div>
  <script>
    // Stuck-loading watchdog (playbook §10.6). If the preloader is still
    // visible 12 seconds after page load, surface a reload button. Boot
    // success removes the #nfr-preload node, which is what cancels this.
    (function () {
      var btn = document.getElementById('nfr-preload-recover-btn');
      if (btn) {
        btn.addEventListener('click', function () {
          try { window.location.reload(); } catch (_) { /* no-op */ }
        });
      }
      setTimeout(function () {
        var node = document.getElementById('nfr-preload');
        var recover = document.getElementById('nfr-preload-recover');
        if (node && recover && !node.classList.contains('fading')) {
          recover.classList.add('is-visible');
          // Best-effort analytics ping. CrazyGames SDK may not be ready yet;
          // we try the public surface and swallow any throw.
          try {
            var sdk = (window.CrazyGames || {}).SDK;
            if (sdk && sdk.analytics && typeof sdk.analytics.trackEvent === 'function') {
              sdk.analytics.trackEvent('preload_stuck', { elapsedSec: 12 });
            }
          } catch (_) { /* SDK not yet usable; recover UI is the actual fix. */ }
        }
      }, 12000);
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
