function showFactory() {
function showFactory() {
  G.mode = 'factory';
  document.getElementById('screen').classList.remove('hidden');
  document.getElementById('hud').classList.remove('active');
  G.raid = null;
  Audio.init();

  const content = document.getElementById('screen-content');
  const s = Storage.data;

  // Build factory grid
  const machines = Object.keys(MACHINE_DEFS).map(key => {
    const def = MACHINE_DEFS[key];
    const lvl = s.machines[key];
    const unlocked = def.unlock();
    const infested = s.infested.includes(key);
    const cost = def.cost(lvl);
    const canAfford = s.scrap >= cost;
    const maxed = lvl >= def.max;
    const locked = !unlocked;
    let cls = 'machine';
    if (locked) cls += ' locked';
    if (infested) cls += ' infested';
    return `
      <div class="${cls}" data-key="${key}">
        <div class="machine-head">
          <div class="machine-name">${def.name}</div>
          <div class="machine-level">${lvl}/${def.max}</div>
        </div>
        <div class="machine-desc">${locked ? 'Locked: ' + getUnlockHint(key) : def.desc}</div>
        ${infested ? `<div class="machine-bonus" style="color: var(--red);">⚠ INFESTED — production halted</div>` : ''}
        ${!locked ? `<div class="machine-bonus">${def.effect(lvl)}</div>` : ''}
        ${!locked && !maxed ? `<button class="machine-upgrade-btn" data-key="${key}" ${canAfford ? '' : 'disabled'}>UPGRADE · ${fmtNum(cost)}</button>` : maxed && !locked ? `<button class="machine-upgrade-btn" disabled>MAXED</button>` : ''}
      </div>
    `;
  }).join('');

  const spm = computeSPM();

  // v2: storage capacity bar
  const cap = getStorageCap();
  const fill = clamp(s.scrap / cap, 0, 1);
  const overflow = s.scrap >= cap;

  // v2: hub buttons with badges
  const droneSlots = droneSlotCount();
  const droneReady = (s.drones || []).some(d => d.done || (Date.now() - d.startedAt >= d.duration * 1000));
  const researchDone = s.research?.current && (Date.now() - s.research.current.startedAt >= s.research.current.duration);
  const signalUnlocked = (s.machines.signal || 0) >= 1;
  // Roll daily so we know if a quest is claimable today
  if (signalUnlocked) rollDaily();
  const dq = signalUnlocked ? getDailyQuest() : null;
  const dailyClaimable = signalUnlocked && Storage.data.daily.questProgress >= (dq ? dq.target : Infinity) && !Storage.data.daily.questClaimed;
  // Operators / achievements - new unlocks check
  const newOps = Object.values(OPERATORS).filter(op => op.isUnlocked() && !(s.unlockedOperators||[]).includes(op.id));
  for (const op of newOps) s.unlockedOperators.push(op.id);
  const newAchCount = ACHIEVEMENTS.filter(a => !s.achievements.includes(a.id) && a.check()).length;

  const hubBtn = (id, label, badge, locked) => {
    const lock = locked ? ' locked' : '';
    const b = badge ? `<span class="badge">${badge}</span>` : '';
    return `<button class="hub-btn${lock}" data-hub="${id}" ${locked?'disabled':''}>${label}${b}</button>`;
  };

  content.innerHTML = `
    <div class="factory-screen">
      <div class="factory-header">
        <div class="header-title">// FACTORY · ${currentArena().name}</div>
        <div class="currency-row">
          <div class="currency"><div class="currency-icon scrap"></div><div><div class="currency-label">SCRAP</div><div class="currency-value amber" id="cur-scrap">${fmtNum(s.scrap)}</div></div></div>
          <div class="currency"><div class="currency-icon core"></div><div><div class="currency-label">CORES</div><div class="currency-value green" id="cur-cores">${s.cores}</div></div></div>
          <div class="currency"><div style="width:22px;height:22px;color:var(--cyan);font-family:'Orbitron';font-weight:900;font-size:18px;text-align:center;line-height:22px;text-shadow:0 0 10px var(--cyan)">@</div><div><div class="currency-label">SPM</div><div class="currency-value">${spm.toFixed(0)}</div></div></div>
        </div>
      </div>

      <div class="storage-bar-wrap">
        <div class="storage-bar-label">STORAGE</div>
        <div class="storage-bar"><div class="storage-bar-fill" style="width: ${(fill*100).toFixed(1)}%"></div></div>
        <div class="storage-bar-text" style="color:${overflow ? 'var(--red)' : (fill>0.85 ? 'var(--amber)' : 'var(--ink-dim)')}">${fmtNum(s.scrap)} / ${fmtNum(cap)}</div>
      </div>

      <div class="hub-row">
        ${droneSlots > 0 ? hubBtn('drones', 'DRONE BAY', droneReady ? '!' : '', false) : hubBtn('drones', 'DRONE BAY', '', true)}
        ${(s.machines.refinery||0) >= 1 || (s.machines.generator||0) >= 8 ? hubBtn('research', 'RESEARCH', researchDone ? '!' : '', false) : hubBtn('research', 'RESEARCH', '', true)}
        ${signalUnlocked ? hubBtn('daily', 'DAILY SIGNAL', dailyClaimable ? '!' : '', false) : hubBtn('daily', 'DAILY SIGNAL', '', true)}
        ${hubBtn('operators', 'OPERATORS', newOps.length || '', false)}
        ${hubBtn('arenas', 'ARENAS', '', false)}
        ${hubBtn('achievements', 'ACHIEVEMENTS', newAchCount || '', false)}
      </div>

      <div class="factory-grid">${machines}</div>
      <div class="factory-footer">
        <button class="menu-btn primary deploy-pulse" id="btn-deploy">DEPLOY ▸ RAID</button>
        ${s.cores > 0 && s.machines.refinery >= 1 ? `<button class="menu-btn" id="btn-refinery">REFINERY</button>` : ''}
        <button class="menu-btn" id="btn-back" style="font-size: 11px; padding: 10px 24px;">TITLE</button>
      </div>
    </div>
  `;

  // hub button wiring
  document.querySelectorAll('.hub-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.hub;
      if (k === 'drones') showDroneBay();
      else if (k === 'research') showResearchLab();
      else if (k === 'daily') showDailyScreen();
      else if (k === 'operators') showOperators();
      else if (k === 'arenas') showArenas();
      else if (k === 'achievements') showAchievements();
    });
  });

  // bind machine click for tap-boost
  document.querySelectorAll('.machine').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('machine-upgrade-btn')) return;
      const key = el.dataset.key;
      // boost: small instant scrap if generator
      if (key === 'generator' && !s.infested.includes('generator')) {
        const spm = computeSPM();
        const give = Math.floor(spm / 60 * 4 * 1.5); // 1.5x for 4 seconds compressed
        if (give > 0) {
          const cap = getStorageCap();
          if (s.scrap < cap) s.scrap = Math.min(cap, s.scrap + give);
          spawnFloatingNum(e.clientX, e.clientY, '+' + fmtNum(give), '#ffc233');
          Audio.pickup();
          updateFactoryDisplay();
        }
      }
    });
  });
  document.querySelectorAll('.machine-upgrade-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const def = MACHINE_DEFS[key];
      const lvl = s.machines[key];
      const cost = def.cost(lvl);
      if (s.scrap >= cost) {
        s.scrap -= cost;
        s.machines[key]++;
        Audio.pickup();
        Storage.save();
        showFactory();
      }
    });
  });

  document.getElementById('btn-deploy').onclick = () => {
    const infestNow = s.infested.length > 0;
    startRaid({ infestationFix: infestNow ? Math.min(5, s.infested.length * 4) : 0 });
  };
  document.getElementById('btn-back').onclick = () => showMenu();
  const refBtn = document.getElementById('btn-refinery');
  if (refBtn) refBtn.onclick = () => showRefinery();
}

function getUnlockHint(key) {
  switch (key) {
    case 'drones': return 'Generator level 3';
    case 'magnet': return 'Generator level 5';
    case 'blaster': return 'Generator level 7';
    case 'refinery': return 'Generator level 10 + 1 Core';
    case 'signal': return 'Complete 10 raids';
    case 'portal': return 'Generator level 12 + 5 Cores';
  }
  return '';
}

function updateFactoryDisplay() {
  document.getElementById('cur-scrap').textContent = fmtNum(Storage.data.scrap);
  document.getElementById('cur-cores').textContent = Storage.data.cores;
}

function spawnFloatingNum(x, y, txt, color) {
  const el = document.createElement('div');
  el.className = 'floating-num';
  el.textContent = txt;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.color = color;
  el.style.textShadow = '0 0 12px ' + color;
  el.style.fontSize = '22px';
  el.style.opacity = '1';
  el.style.transition = 'transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s linear';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transform = `translate(${rand(-30, 30)}px, -80px)`;
    el.style.opacity = '0';
  });
  setTimeout(() => el.remove(), 850);
}

// ================== v2 SUB-SCREENS ==================

function _backToFactory() { showFactory(); }
function _fmtDuration(sec) {
  if (sec < 60) return Math.ceil(sec) + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + Math.floor(sec%60) + 's';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}

// ---------- DRONE BAY ----------
function showDroneBay() {
  const s = Storage.data;
  const slots = droneSlotCount();
  const content = document.getElementById('screen-content');
  const now = Date.now();
  // build slot rendering
  let slotsHtml = '';
  for (let i = 0; i < slots; i++) {
    const d = s.drones[i];
    if (!d) {
      slotsHtml += `<div class="drone-slot" data-slot="${i}">
        <div class="drone-slot-title">SLOT ${i+1} · EMPTY</div>
        <div class="drone-slot-status">Pick a mission below to deploy.</div>
      </div>`;
    } else {
      const m = DRONE_MISSIONS[d.mission];
      const elapsed = (now - d.startedAt) / 1000;
      const remain = Math.max(0, d.duration - elapsed);
      const done = remain <= 0;
      const cls = done ? 'drone-slot done' : 'drone-slot busy';
      const pct = clamp(elapsed / d.duration, 0, 1) * 100;
      slotsHtml += `<div class="${cls}" data-slot="${i}">
        <div class="drone-slot-title">SLOT ${i+1} · ${m ? m.name : d.mission}</div>
        <div class="drone-slot-status">${done ? 'MISSION COMPLETE — TAP TO CLAIM' : 'Returns in ' + _fmtDuration(remain)}</div>
        <div class="drone-slot-bar"><div class="drone-slot-bar-fill" style="width:${pct.toFixed(0)}%"></div></div>
        ${done ? `<button class="machine-upgrade-btn" data-claim="${i}">CLAIM REWARDS</button>` : `<button class="machine-upgrade-btn" data-recall="${i}" style="background:rgba(255,51,85,.1);border-color:var(--red);color:var(--red)">RECALL (lose 50% time)</button>`}
      </div>`;
    }
  }

  // mission picker
  let missionsHtml = '';
  Object.values(DRONE_MISSIONS).forEach(m => {
    const r = m.reward();
    const rwd = [];
    if (r.scrap) rwd.push(`+${fmtNum(r.scrap)} Scrap`);
    if (r.cores) rwd.push(`+${r.cores} Cores`);
    if (r.clearInfest) rwd.push(`Clears 1 infestation`);
    missionsHtml += `<div class="drone-mission" data-mission="${m.id}">
      <div class="drone-mission-name">${m.name}</div>
      <div class="drone-mission-dur">${_fmtDuration(m.duration)}</div>
      <div class="drone-mission-desc">${m.desc}</div>
      <div class="drone-mission-rwd">${rwd.join(' · ')}</div>
    </div>`;
  });

  content.innerHTML = `<div class="subscreen">
    <div class="subscreen-head">
      <div class="subscreen-title">// DRONE BAY</div>
      <button class="subscreen-back" id="back">◀ FACTORY</button>
    </div>
    <div class="subscreen-section">
      <h3>EXPEDITION SLOTS · ${slots ? slots : 'LOCKED'}</h3>
      ${slots > 0 ? slotsHtml : '<div style="color:var(--ink-dim);font-size:12px;">Upgrade Drone Bay to level 2 to unlock expedition slots.</div>'}
    </div>
    ${slots > 0 ? `<div class="subscreen-section">
      <h3>AVAILABLE MISSIONS</h3>
      <div class="drone-mission-grid">${missionsHtml}</div>
    </div>` : ''}
  </div>`;

  document.getElementById('back').onclick = _backToFactory;

  // claim handlers
  document.querySelectorAll('[data-claim]').forEach(btn => btn.onclick = (e) => {
    e.stopPropagation();
    const i = +btn.dataset.claim;
    const d = s.drones[i];
    if (!d) return;
    const m = DRONE_MISSIONS[d.mission];
    if (!m) { s.drones.splice(i, 1); Storage.save(); showDroneBay(); return; }
    const r = m.reward();
    if (r.scrap) {
      const cap = getStorageCap();
      s.scrap = Math.min(cap, s.scrap + r.scrap);
    }
    if (r.cores) { s.cores += r.cores; s.totalCores += r.cores; }
    if (r.clearInfest && s.infested.length > 0) {
      s.infested.splice(0, 1);
    }
    s.drones.splice(i, 1);
    Storage.save();
    Audio.core();
    showDroneBay();
  });
  // recall
  document.querySelectorAll('[data-recall]').forEach(btn => btn.onclick = (e) => {
    e.stopPropagation();
    const i = +btn.dataset.recall;
    if (confirm('Recall drone? You lose 50% of remaining time as wasted travel and get partial reward.')) {
      const d = s.drones[i];
      if (d) {
        const elapsed = (Date.now() - d.startedAt) / 1000;
        const pct = clamp(elapsed / d.duration, 0, 1);
        const m = DRONE_MISSIONS[d.mission];
        if (m) {
          const r = m.reward();
          if (r.scrap) {
            const cap = getStorageCap();
            s.scrap = Math.min(cap, s.scrap + Math.floor(r.scrap * pct * 0.5));
          }
          if (r.cores) s.cores += Math.floor(r.cores * pct * 0.5);
        }
        s.drones.splice(i, 1);
        Storage.save();
        showDroneBay();
      }
    }
  });
  // mission dispatch
  document.querySelectorAll('[data-mission]').forEach(el => el.onclick = () => {
    const id = el.dataset.mission;
    const m = DRONE_MISSIONS[id];
    // find empty slot
    let slotI = -1;
    for (let i = 0; i < slots; i++) if (!s.drones[i]) { slotI = i; break; }
    if (slotI < 0) { alert('All slots are busy. Wait for a drone to return.'); return; }
    // apply drone festival modifier to duration
    let dur = m.duration;
    const mod = getDailyModifier();
    if (Storage.data.daily.modifierId === 'drone_festival' && mod?.effect?.droneSpeed) dur = Math.floor(dur / mod.effect.droneSpeed);
    s.drones[slotI] = { id: id+'_'+Date.now(), mission: id, startedAt: Date.now(), duration: dur, done: false };
    Storage.save();
    Audio.powerup();
    showDroneBay();
  });
}

// ---------- RESEARCH LAB ----------
function showResearchLab() {
  const s = Storage.data;
  const content = document.getElementById('screen-content');
  const now = Date.now();
  let activeHtml = '';
  if (s.research.current) {
    const def = RESEARCH[s.research.current.id];
    if (def) {
      const elapsed = (now - s.research.current.startedAt) / 1000;
      const total = s.research.current.duration / 1000;
      const remain = Math.max(0, total - elapsed);
      const done = remain <= 0;
      const pct = clamp(elapsed / total, 0, 1) * 100;
      activeHtml = `<div class="research-active">
        <div class="research-name" style="color:${done ? 'var(--green)' : 'var(--magenta)'}">${def.name}</div>
        <div class="research-desc">${def.desc}</div>
        <div class="drone-slot-bar"><div class="drone-slot-bar-fill" style="width:${pct.toFixed(0)}%; background:${done?'var(--green)':'var(--magenta)'}"></div></div>
        <div style="font-size:11px; margin-top:6px; color:var(--ink-dim); letter-spacing:.1em;">
          ${done ? 'COMPLETE — TAP TO INSTALL' : 'In progress · ' + _fmtDuration(remain) + ' remaining'}
        </div>
        ${done ? `<button class="machine-upgrade-btn" id="install" style="margin-top:8px;">INSTALL RESEARCH</button>` : `<button class="machine-upgrade-btn" id="cancel" style="margin-top:8px; background:rgba(255,51,85,.1); border-color:var(--red); color:var(--red);">CANCEL (no refund)</button>`}
      </div>`;
    }
  }
  let tilesHtml = '';
  Object.values(RESEARCH).forEach(def => {
    const completed = s.research.completed.includes(def.id);
    const eligible = def.requires() && !completed && !s.research.current;
    const canAfford = s.scrap >= def.costScrap && s.cores >= def.costCores;
    let cls = 'research-tile';
    if (completed) cls += ' complete';
    else if (!eligible || !canAfford) cls += ' disabled';
    tilesHtml += `<div class="${cls}" data-rid="${def.id}">
      <div class="research-name">${def.name}</div>
      <div class="research-desc">${def.desc}</div>
      <div class="research-meta">
        <span class="research-cost">${def.costScrap ? '⚡ ' + fmtNum(def.costScrap) : ''}${def.costCores ? '  ◆ ' + def.costCores : ''}</span>
        <span class="research-dur">${_fmtDuration(def.duration)}</span>
      </div>
      ${completed ? `<div style="margin-top:6px; font-size:10px; color:var(--green); letter-spacing:.15em;">✓ INSTALLED</div>` : ''}
    </div>`;
  });

  content.innerHTML = `<div class="subscreen">
    <div class="subscreen-head">
      <div class="subscreen-title">// RESEARCH LAB</div>
      <button class="subscreen-back" id="back">◀ FACTORY</button>
    </div>
    ${activeHtml ? `<div class="subscreen-section"><h3>ACTIVE</h3>${activeHtml}</div>` : ''}
    <div class="subscreen-section">
      <h3>AVAILABLE PROJECTS</h3>
      <div class="research-grid">${tilesHtml}</div>
    </div>
  </div>`;
  document.getElementById('back').onclick = _backToFactory;

  const install = document.getElementById('install');
  if (install) install.onclick = () => {
    s.research.completed.push(s.research.current.id);
    s.research.current = null;
    Storage.save();
    Audio.core();
    checkAchievements();
    showResearchLab();
  };
  const cancel = document.getElementById('cancel');
  if (cancel) cancel.onclick = () => {
    if (confirm('Cancel research? No refund.')) {
      s.research.current = null;
      Storage.save();
      showResearchLab();
    }
  };

  document.querySelectorAll('[data-rid]').forEach(el => el.onclick = () => {
    if (el.classList.contains('disabled') || el.classList.contains('complete')) return;
    if (s.research.current) return;
    const id = el.dataset.rid;
    const def = RESEARCH[id];
    if (!def.requires()) return;
    if (s.scrap < def.costScrap || s.cores < def.costCores) return;
    s.scrap -= def.costScrap;
    s.cores -= def.costCores;
    s.research.current = { id, startedAt: Date.now(), duration: def.duration * 1000 };
    Storage.save();
    Audio.powerup();
    showResearchLab();
  });
}

// ---------- DAILY SIGNAL ----------
function showDailyScreen() {
  rollDaily();
  const s = Storage.data;
  const content = document.getElementById('screen-content');
  const dq = getDailyQuest();
  const dm = getDailyModifier();
  const pct = clamp(s.daily.questProgress / dq.target, 0, 1) * 100;
  const completed = s.daily.questProgress >= dq.target;
  const claimed = s.daily.questClaimed;

  // daily login reward (escalating, capped at 7-day streak)
  const todayK = todayKey();

function computeSPM() {
  const s = Storage.data;
  const genLvl = s.machines.generator;
  const droneLvl = s.machines.drones;
  const refMult = 1 + s.refinery.scrapMult * 0.1;
  // total machines
  const machineKeys = Object.keys(s.machines).filter(k => s.machines[k] > 0);
  const infestRatio = machineKeys.length > 0 ? s.infested.length / machineKeys.length : 0;
  const productionMult = 1 - infestRatio;
  return 14 * genLvl * (1 + droneLvl * 0.22) * refMult * productionMult;
}

// ---------- MAIN LOOP ----------
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(1 / 30, (now - lastT) / 1000);
  lastT = now;
  G.time += dt;

  // resize canvas
  resizeCanvas();
  const ctx = G.ctx;
  ctx.clearRect(0, 0, G.W, G.H);

  // background scenic glow
  drawBgAmbient(ctx);

  // update
  if (G.raid && !G.paused) {
    G.raid.update(dt);
    G.raid.render(ctx);
    updateHUD();
    // auto save every 5s
    if (G.time - G.ui.lastSave > 5) {
      G.ui.lastSave = G.time;
      Storage.save();
    }
  } else if (G.raid && G.paused) {
    G.raid.render(ctx);
  } else if (G.mode === 'factory') {
    // factory ambient: subtle moving dots
    drawFactoryAmbient(ctx);
  } else {
    drawTitleAmbient(ctx);
  }

  requestAnimationFrame(loop);
}

function drawBgAmbient(ctx) {
  // subtle vignette already in HTML
}

function drawTitleAmbient(ctx) {
  // floating energy particles
  const t = G.time;
  for (let i = 0; i < 40; i++) {
    const x = (i * 137 + t * 30) % G.W;
    const y = (i * 89 + t * 20 + Math.sin(t + i) * 40) % G.H;
    const size = (i % 4) + 1;
    ctx.fillStyle = i % 5 === 0 ? 'rgba(255, 45, 191, 0.35)' : 'rgba(34, 255, 238, 0.25)';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, TAU);
    ctx.fill();
  }
}

function drawFactoryAmbient(ctx) {
  const t = G.time;
  // gentle pulse network
  ctx.strokeStyle = 'rgba(34, 255, 238, 0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = (i * 100 + t * 20) % G.H;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(G.W, y);
    ctx.stroke();
  }
}

function resizeCanvas() {
  const canvas = G.canvas;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  G.DPR = dpr;
  const w = window.innerWidth;
  const h = window.innerHeight;
  if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  G.W = w; G.H = h;
  G.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ---------- OFFLINE / "WHILE YOU WERE AWAY" SUMMARY ----------
// Compute everything that happened while away and present a rich summary.
async function processOfflineProgression() {
  const s = Storage.data;
  const now = Date.now();
  const elapsedSec = Math.min((now - (s.lastSeen || now)) / 1000, 8 * 3600); // cap 8h
  const cap = getStorageCap();

  // 1. Scrap production
  const spm = computeSPM();
  let scrapEarned = Math.floor((spm / 60) * elapsedSec);
  // factor in factory modifier if today was a Scrap Storm day at any point
  if (s.daily.modifierId === 'scrap_storm' && s.daily.date === todayKey()) scrapEarned = Math.floor(scrapEarned * 1.25);
  // capacity check
  let overflowLost = 0;
  if (s.scrap + scrapEarned > cap) {
    const room = Math.max(0, cap - s.scrap);
    const overflowAmount = scrapEarned - room;
    overflowLost = Math.floor(overflowAmount * 0.5);  // 50% lost beyond cap
    scrapEarned = room + Math.floor(overflowAmount * 0.5);
  }
  s.scrap = Math.min(cap, s.scrap + scrapEarned);

  // 2. Drone returns (auto-collect to a buffer for summary display)
  const droneReturns = [];
  for (let i = s.drones.length - 1; i >= 0; i--) {
    const d = s.drones[i];
    const dElapsed = (now - d.startedAt) / 1000;
    if (dElapsed >= d.duration && !d.done) {
      d.done = true; // mark so UI shows claim button
      const m = DRONE_MISSIONS[d.mission];
      if (m) droneReturns.push({ name: m.name, mission: d.mission });
    }
  }

  // 3. Research completion
  let researchCompleted = null;
  if (s.research.current) {
    const rElapsed = now - s.research.current.startedAt;
    if (rElapsed >= s.research.current.duration) {
      const def = RESEARCH[s.research.current.id];
      researchCompleted = def ? def.name : s.research.current.id;
      // Mark as ready to install (player taps in research lab)
    }
  }

  // 4. Roll daily and check signal availability
  const signalOn = (s.machines.signal || 0) >= 1;
  if (signalOn) rollDaily();

  // 5. Magnet Pulse research — auto-collect any storageBuf (currently unused, future hook)

  s.lastSeen = now;
  await Storage.save();

  return {
    elapsedSec,
    scrapEarned,
    overflowLost,
    droneReturns,
    researchCompleted,
    storageFull: s.scrap >= cap,
    storagePct: clamp(s.scrap / cap, 0, 1),
    infestedCount: s.infested.length,
    signalOn,
    dailyReady: signalOn && s.daily.date === todayKey() && !s.daily.questClaimed,
  };
}

async function showOfflineEarnings(summary) {
  // skip showing if literally nothing happened
  if (summary.elapsedSec < 30 &&
      !summary.droneReturns.length &&
      !summary.researchCompleted &&
      summary.scrapEarned < 1 &&
      summary.infestedCount === 0) return;
  return new Promise((resolve) => {
    const screen = document.getElementById('screen');
    const content = document.getElementById('screen-content');
    screen.classList.remove('hidden');
    const lines = [];
    if (summary.scrapEarned > 0) lines.push(`<div class="line"><span class="lbl">Generators produced</span><span class="val">+${fmtNum(summary.scrapEarned)} Scrap</span></div>`);
    if (summary.overflowLost > 0) lines.push(`<div class="line warn"><span class="lbl">Lost to overflow</span><span class="val">−${fmtNum(summary.overflowLost)} Scrap</span></div>`);
    summary.droneReturns.forEach(d => {
      lines.push(`<div class="line good"><span class="lbl">Drone returned: ${d.name}</span><span class="val">READY</span></div>`);
    });
    if (summary.researchCompleted) {
      lines.push(`<div class="line good"><span class="lbl">Research complete: ${summary.researchCompleted}</span><span class="val">INSTALL</span></div>`);
    }
    lines.push(`<div class="line${summary.storageFull?' warn':''}"><span class="lbl">Storage</span><span class="val">${(summary.storagePct*100).toFixed(0)}% full</span></div>`);
    if (summary.dailyReady) {
      lines.push(`<div class="line good"><span class="lbl">Daily Signal</span><span class="val">EVENT READY</span></div>`);
    }
    if (summary.infestedCount > 0) {
      lines.push(`<div class="line warn"><span class="lbl">Infested machines</span><span class="val">${summary.infestedCount}</span></div>`);
    }
    content.innerHTML = `
      <div class="title-screen">
        <div class="offline-modal" style="width: min(480px, 100%);">
          <div class="offline-title">WHILE YOU WERE AWAY</div>
          <div class="offline-time">// ${fmtTime(summary.elapsedSec)} //</div>
          <div class="offline-detail">${lines.join('')}</div>
          <button class="menu-btn primary" id="btn-collect">CONTINUE</button>
        </div>
      </div>
    `;
    document.getElementById('btn-collect').onclick = () => resolve();
  });
}

// ---------- INIT ----------
async function init() {
  G.canvas = document.getElementById('canvas');
  G.ctx = G.canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  setupTouch();

  await Storage.load();

  // v2: rich offline progression
  const summary = await processOfflineProgression();
  if (Storage.data.tutorialDone) {
    await showOfflineEarnings(summary);
  }

  showMenu();
  requestAnimationFrame((t) => { lastT = t; loop(t); });

  // periodic background ticker: completes drones/research without needing UI refresh
  setInterval(async () => {
    const s = Storage.data;
    const now = Date.now();
    let dirty = false;
    // mark drone missions done
    for (const d of s.drones) {
      if (!d.done && (now - d.startedAt) / 1000 >= d.duration) { d.done = true; dirty = true; }
    }
    // touch lastSeen for proper offline calc on next launch
    s.lastSeen = now;
    if (dirty) {
      // toast pop in factory view (visual only when on factory screen)
      if (G.mode === 'factory') {
        const t = document.createElement('div');
        t.className = 'ach-toast';
        t.innerHTML = `<div class="ach-toast-title">DRONE RETURNED</div><div class="ach-toast-name">EXPEDITION COMPLETE</div><div class="ach-toast-desc">Check the Drone Bay to claim rewards.</div>`;
        document.body.appendChild(t);
        setTimeout(() => t.classList.add('show'), 30);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 600); }, 4200);
      }
    }
    Storage.save();
  }, 8000);

  // Save on unload
  window.addEventListener('beforeunload', () => {
    Storage.data.lastSeen = Date.now();
    Storage.save();
  });

  // resume audio on first interaction
  const resume = () => { Audio.init(); if (Audio.ctx) Audio.ctx.resume?.(); };
  window.addEventListener('click', resume, { once: true });
  window.addEventListener('keydown', resume, { once: true });
  window.addEventListener('touchstart', resume, { once: true });
}

init();
