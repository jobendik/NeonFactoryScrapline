class Raid {
  constructor({ tutorial = false } = {}) {
    this.tutorial = tutorial;
    this.duration = tutorial ? TUTORIAL_DURATION : RAID_DURATION;
    this.extractOpenAt = tutorial ? EXTRACT_OPEN_TIME_TUT : EXTRACT_OPEN_TIME;
    this.time = 0;
    this.ended = false;
    this.endType = null; // 'success' | 'death' | 'timeout'

    // entities
    this.player = null;
    this.enemies = [];
    this.projectiles = [];
    this.enemyProjs = [];
    this.loot = [];        // {x,y,type,vx,vy,life}
    this.powerups = [];    // power-up tiles on ground
    this.particles = [];
    this.texts = [];
    this.drones = [];

    // run vars
    this.scrap = 0;
    this.cores = 0;
    this.kills = 0;
    this.combo = 1;
    this.comboTimer = 0;
    this.combos = []; // recent kills for display

    this.extractProgress = 0;
    this.extractPad = null;

    // greed
    this.greedTime = 0;
    this.greed = 1.0;

    // spawn director
    this.spawnTimer = 0;
    this.spawnInterval = 0.95;

    // power-up spawn timing
    this.nextPowerupAt = 8;

    // draft moments
    this.draftPoints = tutorial ? [] : [20, 45];
    this.draftPicked = [];

    // upgrade modifiers
    this.upgrades = {
      damageMult: 1,
      speedMult: 1,
      magnetMult: 1,
      fireMult: 1,
      rangeMult: 1,
      coreChance: 1,
      pierce: 0,
      bounce: 0,
      split: 0,
      dashCdMult: 1,
      scrapHeal: 0,
      slowField: false,
      critChance: 0,
      berserk: false,
      bonusDrones: 0,
      killHeal: 0,
      dashRing: false,
      lootMult: 1,
      revives: 0,
    };

    // temp effects
    this.fx = {
      laserUntil: 0,
      freezeUntil: 0,
      goldUntil: 0,
      magnetPulses: 0,
    };

    // infestation special
    this.infestationToKill = 0; // if > 0, this is the infest-clear wave
    this.infestationKilled = 0;

    // arena (we'll use a moving camera; arena bounds are fixed)
    const ar = currentArena();
    const aw = ar.mods.w || ARENA_W;
    const ah = ar.mods.h || ARENA_H;
    this.arena = { x: -aw / 2, y: -ah / 2, w: aw, h: ah };
    this.arenaId = ar.id;
    this.arenaMods = ar.mods;
    // daily modifier (only applied to non-tutorial raids)
    this.modifier = (!tutorial) ? getDailyModifier() : null;
    // v2 quest tracking
    this.questFlags = { noHit: true, coresThisRun: 0, reachedGreed2: false };
    // v2 Firewall Wave timing
    this.firewallAt = (this.arenaMods.stormMode || Math.random() < 0.6) ? rand(28, 42) : -1;
    this.firewallSpawned = false;
    this.firewallWarnT = 0;
    // v2 Loot Goblin scheduler
    this.goblinNextAt = rand(15, 30);
    // v2 jammer (extract)
    this.jammerActive = false;
    this.jammerSpawnedAt = 0;

    this.initPlayer();
    this.initExtractPad();
    this.applyMetaBoosts();
    this.applyResearchStart();
    this.applyOperatorStart();
    this.applyOperatorPick();
    this.applyDailyModifier();
    this.initDrones();
  }

  initPlayer() {
    const refinery = Storage.data.refinery;
    const maxHp = BASE_PLAYER_HP + refinery.hpBoost * 15;
    this.player = {
      x: 0, y: 0,
      vx: 0, vy: 0,
      r: 16,
      hp: maxHp,
      maxHp,
      facing: 0,
      dashCd: 0,
      dashCharges: hasResearch('double_dash') ? 2 : 1,  // v2
      dashCapacity: hasResearch('double_dash') ? 2 : 1,
      dashTimer: 0,
      dashDir: { x: 0, y: 0 },
      invuln: 0,
      fireCd: 0,
      shield: 0,
      revives: 0,
      flashHurt: 0,
      trailTimer: 0,
    };
  }

  applyMetaBoosts() {
    const ref = Storage.data.refinery;
    this.upgrades.magnetMult *= 1 + ref.magnetBoost * 0.15;
    this.upgrades.dashCdMult *= Math.pow(0.92, ref.dashBoost);
    this.upgrades.coreChance *= 1 + ref.coreChance * 0.2;
    this.upgrades.lootMult *= 1 + ref.scrapMult * 0.1;

    // blaster lab gives raid damage
    this.upgrades.damageMult *= 1 + Storage.data.machines.blaster * 0.15;
    // magnet coil
    this.upgrades.magnetMult *= 1 + Storage.data.machines.magnet * 0.15;
  }

  applyOperatorStart() {
    const ref = Storage.data.refinery;
    if (ref.startDrone > 0) this.upgrades.bonusDrones += ref.startDrone;
  }

  applyOperatorPick() {
    const op = OPERATORS[Storage.data.operatorId];
    if (op && op.apply) op.apply(this);
    this.operator = op;
  }

  applyResearchStart() {
    // v2 research effects
    if (hasResearch('combat_drones')) this.upgrades.dronesShoot = true;
    if (hasResearch('quick_extract')) this.extractHoldTime = 3.5;
    else this.extractHoldTime = EXTRACT_HOLD_TIME;
    if (hasResearch('orbit_pickups')) this.upgrades.orbitPickups = true;
  }

  applyDailyModifier() {
    if (!this.modifier) return;
    const e = this.modifier.effect || {};
    if (e.coreMult) this.upgrades.coreChance *= e.coreMult;
    if (e.magnetMult) this.upgrades.magnetMult *= e.magnetMult;
    if (e.plySpeed) this.upgrades.speedMult *= e.plySpeed;
    // enmySpeed and goblinMult handled in spawn/update
    this.enemySpeedMult = e.enmySpeed || 1.0;
    this.goblinMult = e.goblinMult || 1.0;
    this.eliteEarly = e.eliteEarly || 1.0;
  }

  initDrones() {
    const baseDrones = Storage.data.machines.drones;
    const extra = this.upgrades.bonusDrones;
    const total = baseDrones + extra;
    for (let i = 0; i < total; i++) {
      this.drones.push({
        x: this.player.x, y: this.player.y,
        angle: (i / total) * TAU,
        fireCd: 0,
      });
    }
  }

  initExtractPad() {
    // Place pad somewhere away from spawn
    const angle = rand(0, TAU);
    const dist = 380;
    this.extractPad = {
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist,
      r: 60,
    };
  }

  // ===== SPAWNING =====
  spawnEnemy(type = null) {
    if (this.enemies.length > 32) return;
    if (!type) {
      const intensity = this.time / this.duration;
      const eliteShift = this.eliteEarly || 1.0;
      // weighting shifts as time goes on
      const entries = [
        ['grunt', 10],
        ['swarmer', 5 + intensity * 12],
        ['shooter', 2 + intensity * 5],
        ['tank', 0.5 + intensity * 3 / eliteShift],
        ['bomber', intensity * 4],
        ['splitter', Math.max(0, (intensity - 0.4) * 5)],
        // NEW v2: shielded shows up mid-raid as a priority target
        ['shielded', Math.max(0, (intensity - 0.25) * 4)],
      ];
      // greed adds more dangerous enemies
      if (this.greed >= 1.5) entries.find(e => e[0] === 'tank')[1] += 3;
      if (this.greed >= 2.0) entries.find(e => e[0] === 'bomber')[1] += 4;
      if (this.greed >= 2.5) entries.find(e => e[0] === 'shielded')[1] += 3;
      type = weightedChoice(entries);
    }
    const def = ENEMIES[type];
    // spawn at distance from player
    const ang = rand(0, TAU);
    const spawnDist = rand(420, 600);
    const x = this.player.x + Math.cos(ang) * spawnDist;
    const y = this.player.y + Math.sin(ang) * spawnDist;
    const enemy = {
      type, def,
      x, y, vx: 0, vy: 0,
      hp: def.hp,
      maxHp: def.hp,
      radius: def.radius,
      fireCd: rand(0.4, 1.6),
      slow: 0,
      flash: 0,
      bombTimer: def.bomber ? null : 0,
      knockTimer: 0,
      spawnAnim: 0.4,
      // v2 type-specific state
      facing: rand(0, TAU),       // for shielded direction
      trailCd: 0,                  // for lootgoblin scrap trail
      despawn: def.despawnT || 0,  // for lootgoblin auto-despawn
    };
    this.enemies.push(enemy);
  }

  spawnLootGoblin() {
    if (this.ended) return;
    if (this.enemies.filter(e => e.type === 'lootgoblin').length > 0) return;
    const def = ENEMIES.lootgoblin;
    const ang = rand(0, TAU);
    const dist = rand(280, 420);
    this.enemies.push({
      type: 'lootgoblin', def,
      x: this.player.x + Math.cos(ang) * dist,
      y: this.player.y + Math.sin(ang) * dist,
      vx: 0, vy: 0,
      hp: def.hp, maxHp: def.hp,
      radius: def.radius,
      fireCd: 0, slow: 0, flash: 0,
      bombTimer: 0, knockTimer: 0,
      spawnAnim: 0.5, facing: 0,
      trailCd: 0, despawn: def.despawnT,
    });
    // particle puff to flag it
    for (let i = 0; i < 14; i++) {
      this.particles.push(new Particle({
        x: this.player.x + Math.cos(ang) * dist,
        y: this.player.y + Math.sin(ang) * dist,
        vx: Math.cos(i/14*TAU)*120, vy: Math.sin(i/14*TAU)*120,
        color: '#ffc233', life: 0.6, size: 4, glow: 14,
      }));
    }
    this.texts.push(new FloatText(this.player.x, this.player.y - 60, 'LOOT GOBLIN!', { color: '#ffc233', size: 22, life: 1.5 }));
  }

  // NEW v2: spawn a structured Firewall Wave - grid pattern with gaps
  spawnFirewallWave() {
    const N = 8;          // row width
    const dx = 70;
    const gapStart = randInt(2, N-2);  // 1-2 column gap players can dodge through
    const angle = rand(0, TAU);
    const fwd = { x: Math.cos(angle), y: Math.sin(angle) };
    const right = { x: -fwd.y, y: fwd.x };
    const origin = { x: this.player.x - fwd.x * 520, y: this.player.y - fwd.y * 520 };
    for (let i = 0; i < N; i++) {
      if (i === gapStart || i === gapStart + 1) continue;
      const off = (i - (N-1)/2) * dx;
      const ex = origin.x + right.x * off;
      const ey = origin.y + right.y * off;
      const def = ENEMIES.swarmer;
      this.enemies.push({
        type: 'swarmer', def,
        x: ex, y: ey, vx: fwd.x * 60, vy: fwd.y * 60,
        hp: def.hp * 1.3, maxHp: def.hp * 1.3,
        radius: def.radius,
        fireCd: 0, slow: 0, flash: 0,
        bombTimer: 0, knockTimer: 0,
        spawnAnim: 0.4, facing: angle,
        trailCd: 0, despawn: 0,
        firewall: true,    // tag so they fade red
      });
    }
    this.firewallWarnT = 1.5;
    this.texts.push(new FloatText(0, -200, 'FIREWALL WAVE', { color: '#ff3355', size: 26, life: 2 }));
  }

  // NEW v2: spawn jammer enemies on or near the extract pad once extraction opens
  spawnJammer() {
    if (!this.extractPad) return;
    const def = ENEMIES.jammer;
    const ang = rand(0, TAU);
    const r = 30;
    this.enemies.push({
      type: 'jammer', def,
      x: this.extractPad.x + Math.cos(ang) * r,
      y: this.extractPad.y + Math.sin(ang) * r,
      vx: 0, vy: 0,
      hp: def.hp, maxHp: def.hp,
      radius: def.radius,
      fireCd: 0, slow: 0, flash: 0,
      bombTimer: 0, knockTimer: 0,
      spawnAnim: 0.5, facing: 0,
      trailCd: 0, despawn: 0,
    });
    this.jammerActive = true;
    this.jammerSpawnedAt = this.time;
  }

  spawnInfestation(count) {
    this.infestationToKill = count;
    this.infestationKilled = 0;
    // initial burst of 4
    for (let i = 0; i < 4; i++) {
      const ang = (i / 4) * TAU;
      const dist = 350;
      const x = this.player.x + Math.cos(ang) * dist;
      const y = this.player.y + Math.sin(ang) * dist;
      const def = ENEMIES.infest;
      this.enemies.push({
        type: 'infest', def,
        x, y, vx: 0, vy: 0,
        hp: def.hp, maxHp: def.hp,
        radius: def.radius,
        fireCd: 0, slow: 0, flash: 0,
        spawnAnim: 0.4, isInfest: true,
      });
    }
  }

  spawnPowerUp() {
    if (this.powerups.length >= 10) return;
    const pu = choice(POWERUPS);
    const ang = rand(0, TAU);
    const dist = rand(180, 320);
    this.powerups.push({
      x: this.player.x + Math.cos(ang) * dist,
      y: this.player.y + Math.sin(ang) * dist,
      type: pu,
      bob: 0,
      life: 18,
      r: 22,
    });
  }

  // ===== UPDATE =====
  update(dt) {
    if (this.ended) return;
    this.time += dt;

    // input
    const p = this.player;

    // movement input
    let ix = 0, iy = 0;
    if (G.keys['arrowleft'] || G.keys['a']) ix -= 1;
    if (G.keys['arrowright'] || G.keys['d']) ix += 1;
    if (G.keys['arrowup'] || G.keys['w']) iy -= 1;
    if (G.keys['arrowdown'] || G.keys['s']) iy += 1;
    if (G.touch.active) { ix += G.touch.stickX; iy += G.touch.stickY; }
    const len = Math.hypot(ix, iy);
    if (len > 1) { ix /= len; iy /= len; }

    const baseSpeed = BASE_PLAYER_SPEED * this.upgrades.speedMult;
    const accel = 1800;
    const fric = 0.86;
    // dash
    if (p.dashTimer > 0) {
      p.dashTimer -= dt;
      p.invuln = Math.max(p.invuln, 0.04);
      p.x += p.dashDir.x * (BASE_DASH_DIST * 8) * dt;
      p.y += p.dashDir.y * (BASE_DASH_DIST * 8) * dt;
      // trail
      p.trailTimer -= dt;
      if (p.trailTimer <= 0) {
        for (let i = 0; i < 3; i++) {
          this.particles.push(new Particle(p.x + rand(-6, 6), p.y + rand(-6, 6), {
            vx: rand(-30, 30), vy: rand(-30, 30),
            color: '#a855ff', size: rand(3, 6),
            life: rand(0.2, 0.4), drag: 0.85,
          }));
        }
        p.trailTimer = 0.015;
      }
    } else {
      p.vx = lerp(p.vx, ix * baseSpeed, 1 - Math.pow(0.001, dt));
      p.vy = lerp(p.vy, iy * baseSpeed, 1 - Math.pow(0.001, dt));
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }

    // facing
    if (Math.hypot(ix, iy) > 0.1) p.facing = Math.atan2(iy, ix);

    // dash trigger (v2: supports multi-charge from research)
    if (p.dashCd > 0) p.dashCd -= dt;
    if (p.dashCd <= 0 && p.dashCharges < p.dashCapacity) {
      p.dashCharges++;
      if (p.dashCharges < p.dashCapacity) p.dashCd = BASE_DASH_CD * this.upgrades.dashCdMult;
    }
    const dashKey = G.keys[' '] || G.keys['shift'] || G.touch.dashRequested;
    if (dashKey && p.dashCharges > 0 && p.dashTimer <= 0) {
      const dx = ix, dy = iy;
      const dl = Math.hypot(dx, dy);
      if (dl > 0.1) {
        p.dashDir.x = dx / dl; p.dashDir.y = dy / dl;
      } else {
        p.dashDir.x = Math.cos(p.facing); p.dashDir.y = Math.sin(p.facing);
      }
      p.dashTimer = 0.18;
      p.dashCharges--;
      if (p.dashCharges === 0 || p.dashCd <= 0) {
        p.dashCd = BASE_DASH_CD * this.upgrades.dashCdMult;
      }
      p.invuln = 0.22;
      Audio.dash();
      // dash ring damage if upgrade
      if (this.upgrades.dashRing) {
        this.dealAOE(p.x, p.y, 90, 12, '#a855ff');
      }
    }
    G.touch.dashRequested = false;

    // clamp in arena
    p.x = clamp(p.x, this.arena.x + 30, this.arena.x + this.arena.w - 30);
    p.y = clamp(p.y, this.arena.y + 30, this.arena.y + this.arena.h - 30);

    // invuln
    if (p.invuln > 0) p.invuln -= dt;

    // auto-fire
    let fireInterval = BASE_FIRE_INTERVAL * this.upgrades.fireMult;
    if (this.upgrades.berserk && p.hp / p.maxHp < 0.3) fireInterval *= 0.5;
    if (this.fx.laserUntil > this.time) fireInterval *= 0.4;
    p.fireCd -= dt;
    if (p.fireCd <= 0) {
      const range = BASE_RANGE * this.upgrades.rangeMult;
      const target = this.findNearestEnemy(p.x, p.y, range);
      if (target) {
        this.fireProjectile(p.x, p.y, target);
        p.fireCd = fireInterval;
        // laser shoots extra
        if (this.fx.laserUntil > this.time) {
          // also fire at second target
          const t2 = this.findNearestEnemy(p.x, p.y, range, target);
          if (t2) this.fireProjectile(p.x, p.y, t2);
        }
      }
    }

    // drones
    for (const d of this.drones) {
      const targetAng = d.angle + dt * 1.5;
      d.angle = targetAng;
      const orbitR = 50;
      const tx = p.x + Math.cos(d.angle) * orbitR;
      const ty = p.y + Math.sin(d.angle) * orbitR;
      d.x = lerp(d.x, tx, 1 - Math.pow(0.001, dt));
      d.y = lerp(d.y, ty, 1 - Math.pow(0.001, dt));
      d.fireCd -= dt;
      if (d.fireCd <= 0) {
        const range = BASE_RANGE * this.upgrades.rangeMult * 0.8;
        const target = this.findNearestEnemy(d.x, d.y, range);
        if (target) {
          this.fireProjectile(d.x, d.y, target, { isDrone: true });
          d.fireCd = 0.35;
        }
      }
    }

    // enemies
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const e = this.enemies[i];
      e.spawnAnim = Math.max(0, e.spawnAnim - dt);
      const def = e.def;
      let speed = def.speed;
      // v2: apply daily modifier enemy speed scaling
      if (this.enemySpeedMult && !def.bomber) speed *= this.enemySpeedMult;
      if (this.upgrades.slowField && dist2(e.x, e.y, p.x, p.y) < 200 * 200) speed *= 0.7;
      if (e.slow > 0) { speed *= 0.4; e.slow -= dt; }
      if (this.fx.freezeUntil > this.time) speed *= 0.15;
      const dx = p.x - e.x, dy = p.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      // shooters keep distance
      let mvx, mvy;
      // v2: lootgoblin flees from player and drops scrap trail
      if (def.flees) {
        // run away
        mvx = -dx / d; mvy = -dy / d;
        // gentle wander
        const wob = Math.sin((this.time + i) * 4) * 0.4;
        const right = { x: -mvy, y: mvx };
        mvx += right.x * wob; mvy += right.y * wob;
        // despawn timer
        e.despawn -= dt;
        if (e.despawn <= 0) { this.enemies.splice(i, 1); continue; }
        // drop trail
        e.trailCd -= dt;
        if (e.trailCd <= 0 && this.time > 0.2) {
          e.trailCd = 0.5;
          this.loot.push({
            x: e.x + rand(-10, 10), y: e.y + rand(-10, 10),
            vx: rand(-30, 30), vy: rand(-30, 30),
            type: 'scrap', value: 2, life: 9, r: 7,
          });
        }
        // face flee direction
        e.facing = Math.atan2(mvy, mvx);
      } else if (def.jammer) {
        // stays on extract pad
        if (this.extractPad) {
          const pdx = this.extractPad.x - e.x, pdy = this.extractPad.y - e.y;
          const pd = Math.hypot(pdx, pdy) || 1;
          if (pd > 20) { mvx = pdx / pd; mvy = pdy / pd; }
          else { mvx = 0; mvy = 0; }
        } else { mvx = 0; mvy = 0; }
        // periodic ping particles
        if (Math.random() < dt * 4) {
          this.particles.push(new Particle({ x: e.x, y: e.y, vx: rand(-80,80), vy: rand(-80,80), color: '#ff4488', life: 0.4, size: 2, glow: 10 }));
        }
      } else if (def.ranged) {
        const ideal = 240;
        if (d < ideal - 40) { mvx = -dx / d; mvy = -dy / d; }
        else if (d > ideal + 40) { mvx = dx / d; mvy = dy / d; }
        else {
          mvx = -dy / d; mvy = dx / d;
        }
      } else if (def.bomber) {
        if (d < 90 && e.bombTimer === null) {
          e.bombTimer = 0.6;
        }
        if (e.bombTimer !== null && e.bombTimer >= 0) {
          e.bombTimer -= dt;
          mvx = (dx / d) * 0.2; mvy = (dy / d) * 0.2;
          if (e.bombTimer <= 0) {
            this.explodeBomber(e);
            this.enemies.splice(i, 1);
            continue;
          }
        } else {
          mvx = dx / d; mvy = dy / d;
        }
      } else {
        mvx = dx / d; mvy = dy / d;
        if (def.shielded) {
          // turn toward player
          e.facing = Math.atan2(dy, dx);
        }
      }
      e.x += mvx * speed * dt;
      e.y += mvy * speed * dt;

      if (e.flash > 0) e.flash -= dt;

      // shooter firing
      if (def.ranged) {
        e.fireCd -= dt;
        if (e.fireCd <= 0 && d < def.range + 60 && this.fx.freezeUntil <= this.time) {
          this.fireEnemyProj(e, p);
          e.fireCd = def.fireInterval + rand(-0.2, 0.3);
        }
      }

      // contact damage
      if (this.fx.freezeUntil <= this.time && !def.ranged && !def.bomber) {
        const rr = (e.radius + p.r) * (e.radius + p.r);
        if (dist2(e.x, e.y, p.x, p.y) < rr) {
          this.playerHurt(def.dmg * dt * 2.2);
        }
      }
    }

    // projectiles
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const pr = this.projectiles[i];
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt;
      pr.life -= dt;
      pr.trail.push([pr.x, pr.y]);
      if (pr.trail.length > 6) pr.trail.shift();
      if (pr.life <= 0) { this.projectiles.splice(i, 1); continue; }
      // hit detection
      let hit = false;
      for (let j = 0; j < this.enemies.length; j++) {
        const e = this.enemies[j];
        if (pr.hit && pr.hit.has(e)) continue;
        const rr = (e.radius + 6) * (e.radius + 6);
        if (dist2(pr.x, pr.y, e.x, e.y) < rr) {
          this.damageEnemy(e, pr.damage, pr);
          if (!pr.hit) pr.hit = new Set();
          pr.hit.add(e);
          hit = true;
          // pierce / bounce / split
          if (pr.pierce > 0) {
            pr.pierce--;
            continue;
          }
          if (pr.bounce > 0 && this.enemies.length > 1) {
            pr.bounce--;
            // find new nearest enemy not in hit
            const remain = this.enemies.filter(en => en !== e && !(pr.hit && pr.hit.has(en)));
            if (remain.length > 0) {
              remain.sort((a, b) => dist2(pr.x, pr.y, a.x, a.y) - dist2(pr.x, pr.y, b.x, b.y));
              const nt = remain[0];
              const ang = Math.atan2(nt.y - pr.y, nt.x - pr.x);
              pr.vx = Math.cos(ang) * pr.speed;
              pr.vy = Math.sin(ang) * pr.speed;
              continue;
            }
          }
          if (pr.split > 0) {
            // split into 2 frags
            for (let k = -1; k <= 1; k += 2) {
              const baseAng = Math.atan2(pr.vy, pr.vx);
              const ang = baseAng + k * 0.6;
              this.projectiles.push({
                x: pr.x, y: pr.y,
                vx: Math.cos(ang) * pr.speed * 0.9,
                vy: Math.sin(ang) * pr.speed * 0.9,
                speed: pr.speed * 0.9,
                damage: pr.damage * 0.6,
                life: 0.5,
                pierce: 0, bounce: 0, split: 0,
                trail: [],
                color: pr.color,
                isDrone: pr.isDrone,
              });
            }
          }
          this.projectiles.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;
      // out of bounds removal
      if (pr.x < this.arena.x - 100 || pr.x > this.arena.x + this.arena.w + 100 ||
          pr.y < this.arena.y - 100 || pr.y > this.arena.y + this.arena.h + 100) {
        this.projectiles.splice(i, 1);
      }
    }

    // enemy projectiles
    for (let i = this.enemyProjs.length - 1; i >= 0; i--) {
      const ep = this.enemyProjs[i];
      ep.x += ep.vx * dt;
      ep.y += ep.vy * dt;
      ep.life -= dt;
      if (ep.life <= 0) { this.enemyProjs.splice(i, 1); continue; }
      const rr = (p.r + 6) * (p.r + 6);
      if (dist2(ep.x, ep.y, p.x, p.y) < rr) {
        this.playerHurt(ep.damage);
        this.enemyProjs.splice(i, 1);
      }
    }

    // loot pickup with magnet
    const pickupR = BASE_PICKUP_RADIUS * this.upgrades.magnetMult;
    for (let i = this.loot.length - 1; i >= 0; i--) {
      const l = this.loot[i];
      l.life -= dt;
      l.bob += dt;
      if (l.life <= 0) { this.loot.splice(i, 1); continue; }
      // initial scatter velocity
      l.x += l.vx * dt;
      l.y += l.vy * dt;
      l.vx *= Math.pow(0.86, dt * 60);
      l.vy *= Math.pow(0.86, dt * 60);
      const dx = p.x - l.x, dy = p.y - l.y;
      const d = Math.hypot(dx, dy);
      if (d < pickupR + 5) {
        // accelerate toward player
        const pull = 600;
        l.vx += (dx / d) * pull * dt;
        l.vy += (dy / d) * pull * dt;
      }
      if (d < p.r + 12) {
        // collect
        const goldMul = this.fx.goldUntil > this.time ? 2 : 1;
        if (l.type === 'scrap') {
          const baseValue = l.value || 1;
          const amt = Math.ceil(this.combo * this.upgrades.lootMult * goldMul * baseValue);
          this.scrap += amt;
          this.spawnText(l.x, l.y, '+' + amt, '#ffc233');
          if (this.upgrades.scrapHeal > 0) {
            this.player.hp = Math.min(this.player.maxHp, this.player.hp + this.upgrades.scrapHeal);
          }
          Audio.pickup();
        } else if (l.type === 'core') {
          const amt = 1;
          this.cores += amt;
          this.questFlags.coresThisRun++;  // v2 quest tracking
          this.spawnText(l.x, l.y, '+CORE', '#44ffaa', { size: 22 });
          Audio.core();
        }
        this.loot.splice(i, 1);
      }
    }

    // power-ups
    for (let i = this.powerups.length - 1; i >= 0; i--) {
      const pu = this.powerups[i];
      pu.life -= dt;
      pu.bob += dt;
      if (pu.life <= 0) { this.powerups.splice(i, 1); continue; }
      const d = Math.hypot(p.x - pu.x, p.y - pu.y);
      if (d < p.r + pu.r) {
        this.applyPowerUp(pu.type);
        this.powerups.splice(i, 1);
      }
    }
    if (this.time >= this.nextPowerupAt && !this.tutorial) {
      this.spawnPowerUp();
      this.nextPowerupAt = this.time + rand(9, 14);
    } else if (this.tutorial && this.time >= 18 && this.powerups.length === 0 && !this._tutPwr) {
      this.spawnPowerUp();
      this._tutPwr = true;
    }

    // spawn director
    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0 && !this.tutorial) {
      this.spawnTimer = this.currentSpawnInterval();
      const burstCount = this.greed >= 2 ? 2 : 1;
      for (let i = 0; i < burstCount; i++) this.spawnEnemy();
    } else if (this.tutorial) {
      // gentle tutorial spawn
      this.spawnTimer -= dt;
      if (this.spawnTimer <= 0) {
        if (this.time < 8) this.spawnEnemy('grunt');
        else if (this.time < 20) this.spawnEnemy(Math.random() < 0.6 ? 'grunt' : 'swarmer');
        else this.spawnEnemy(Math.random() < 0.5 ? 'grunt' : 'swarmer');
        this.spawnTimer = 1.0;
      }
    }

    // v2: Loot Goblin scheduler
    if (!this.tutorial && this.time >= this.goblinNextAt) {
      this.spawnLootGoblin();
      const interval = 30 / (this.goblinMult || 1.0);
      this.goblinNextAt = this.time + rand(interval * 0.7, interval * 1.3);
    }

    // v2: Firewall Wave - one warning, then spawn 1.5s later
    if (!this.tutorial && this.firewallAt > 0 && !this.firewallSpawned && this.time >= this.firewallAt) {
      this.firewallWarnT = 1.5;
      this.firewallSpawned = true;
      setTimeout(() => { if (!this.ended) this.spawnFirewallWave(); }, 1500);
      // if storm sector, schedule another wave later
      if (this.arenaMods.stormMode) {
        this.firewallAt = this.time + rand(18, 28);
        this.firewallSpawned = false;
      }
    }
    if (this.firewallWarnT > 0) this.firewallWarnT -= dt;

    // v2: Extract Jammer - spawn periodically once extraction opens and combo >= 1.5
    if (!this.tutorial && this.time >= this.extractOpenAt + 5 && !this.jammerActive
        && (this.time - this.jammerSpawnedAt) > 22 && this.greed >= 1.5) {
      this.spawnJammer();
    }
    // clear jammer flag if it's been killed
    if (this.jammerActive && !this.enemies.some(e => e.type === 'jammer')) {
      this.jammerActive = false;
    }

    // extract update
    if (this.time >= this.extractOpenAt) {
      // greed counter starts ticking
      this.greedTime = this.time - this.extractOpenAt;
      this.greed = this.computeGreed(this.greedTime);
      // track best greed
      if (this.greed > (Storage.data.bestGreed || 1.0)) Storage.data.bestGreed = this.greed;
      // track greed-2 quest
      if (this.greed >= 2.0) this.questFlags.reachedGreed2 = true;
      // check extraction pad — jammer on pad slows progress and prevents extraction
      const dp = Math.hypot(p.x - this.extractPad.x, p.y - this.extractPad.y);
      const onPad = dp < this.extractPad.r;
      const padBlocked = this.enemies.some(e => e.type === 'jammer' && Math.hypot(e.x - this.extractPad.x, e.y - this.extractPad.y) < this.extractPad.r + 10);
      const hold = this.extractHoldTime || EXTRACT_HOLD_TIME;
      if (onPad && !padBlocked) {
        this.extractProgress = Math.min(hold, this.extractProgress + dt);
        if (this.extractProgress >= hold) {
          this.endRun('success');
        }
      } else {
        this.extractProgress = Math.max(0, this.extractProgress - dt * 0.4);
      }
    }

    // infestation clear check
    if (this.infestationToKill > 0 && this.infestationKilled >= this.infestationToKill) {
      // mark a celebration
      if (!this._infestCleared) {
        this._infestCleared = true;
        Audio.powerup();
        this.spawnText(p.x, p.y - 40, 'INFESTATION CLEARED', '#22ffee', { size: 22, vy: -80, life: 2 });
      }
    }

    // combo decay
    if (this.comboTimer > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) this.combo = 1;
    }

    // draft trigger
    for (let i = 0; i < this.draftPoints.length; i++) {
      if (this.time >= this.draftPoints[i] && !this.draftPicked[i]) {
        this.draftPicked[i] = true;
        triggerDraft();
        break;
      }
    }

    // particles & texts
    for (let i = this.particles.length - 1; i >= 0; i--) {
      if (!this.particles[i].update(dt)) this.particles.splice(i, 1);
    }
    for (let i = this.texts.length - 1; i >= 0; i--) {
      if (!this.texts[i].update(dt)) this.texts.splice(i, 1);
    }

    // ground bob
    for (const l of this.loot) l.bob += dt;

    // timeout
    if (!this.tutorial && this.time >= this.duration && !this.ended) {
      this.endRun('timeout');
    }

    // tutorial special end: stand on pad after spawning
    if (this.tutorial && this.time >= this.extractOpenAt) {
      // shown UI prompt
    }

    // remove dead enemies happens in damageEnemy. Trim if huge.
    if (this.enemies.length > 80) this.enemies.splice(0, this.enemies.length - 80);

    // camera follow + shake
    G.cam.x = lerp(G.cam.x, this.player.x, 1 - Math.pow(0.001, dt));
    G.cam.y = lerp(G.cam.y, this.player.y, 1 - Math.pow(0.001, dt));
    G.cam.shake = Math.max(0, G.cam.shake - dt * 30);
    G.cam.flashHurt = Math.max(0, G.cam.flashHurt - dt * 4);
  }

  currentSpawnInterval() {
    const t = this.time / this.duration;
    let base = lerp(0.95, 0.24, t);
    // greed multiplier
    base /= this.greed;
    return base;
  }

  computeGreed(gt) {
    if (gt <= 0) return 1.0;
    if (gt < 10) return 1 + (gt / 10) * 0.25;       // 1.0 -> 1.25
    if (gt < 20) return 1.25 + ((gt - 10) / 10) * 0.25; // 1.25 -> 1.5
    if (gt < 30) return 1.5 + ((gt - 20) / 10) * 0.5;  // 1.5 -> 2.0
    if (gt < 45) return 2.0 + ((gt - 30) / 15) * 1.0;  // 2.0 -> 3.0
    return 3.0 + ((gt - 45) / 30) * 1.0; // beyond 45s: 3.0 -> 4.0
  }

  // ===== COMBAT =====
  findNearestEnemy(x, y, range, excl = null) {
    let best = null; let bd = range * range;
    for (const e of this.enemies) {
      if (e === excl) continue;
      const d = dist2(e.x, e.y, x, y);
      if (d < bd) { bd = d; best = e; }
    }
    return best;
  }

  fireProjectile(x, y, target, opts = {}) {
    const dx = target.x - x, dy = target.y - y;
    const d = Math.hypot(dx, dy) || 1;
    const speed = 760;
    let dmg = 6 * this.upgrades.damageMult;
    if (opts.isDrone) dmg *= 0.7;
    // crit
    if (this.upgrades.critChance > 0 && Math.random() < this.upgrades.critChance) dmg *= 3;
    this.projectiles.push({
      x, y,
      vx: (dx / d) * speed,
      vy: (dy / d) * speed,
      speed,
      damage: dmg,
      life: 1.0,
      pierce: this.upgrades.pierce,
      bounce: this.upgrades.bounce,
      split: this.upgrades.split,
      trail: [],
      color: opts.isDrone ? '#44ffaa' : '#22ffee',
      isDrone: opts.isDrone,
    });
    if (!opts.isDrone) Audio.shot();
  }

  fireEnemyProj(e, target) {
    const dx = target.x - e.x, dy = target.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    const speed = 340;
    // telegraph
    this.particles.push(new Particle(e.x, e.y, {
      vx: 0, vy: 0, size: 18,
      color: e.def.color, life: 0.3,
      shape: 'circle', glow: true, shrink: true,
    }));
    this.enemyProjs.push({
      x: e.x, y: e.y,
      vx: (dx / d) * speed,
      vy: (dy / d) * speed,
      damage: e.def.dmg * 0.6,
      life: 1.4,
      color: e.def.color,
    });
  }

  damageEnemy(e, dmg, source) {
    // v2: shielded enemies block front-facing shots
    if (e.def.shielded && source && typeof source.vx === 'number') {
      const incoming = Math.atan2(-source.vy, -source.vx); // direction shot came from
      const diff = Math.abs(normalizeAngle(incoming - e.facing));
      if (diff < (e.def.shieldArc / 2)) {
        // blocked
        e.flash = 0.08;
        for (let i = 0; i < 4; i++) {
          this.particles.push(new Particle(e.x, e.y, {
            vx: rand(-1, 1) * 200, vy: rand(-1, 1) * 200,
            color: '#a8c8ff', size: rand(3, 5), life: 0.3, glow: true,
          }));
        }
        this.spawnText(e.x, e.y - 18, 'BLOCK', '#a8c8ff', { size: 12, life: 0.5 });
        return;
      }
    }
    e.hp -= dmg;
    e.flash = 0.08;
    // hit particles
    for (let i = 0; i < 3; i++) {
      this.particles.push(new Particle(e.x, e.y, {
        vx: rand(-1, 1) * 150, vy: rand(-1, 1) * 150,
        color: '#ffffff', size: rand(2, 4), life: 0.25,
      }));
    }
    if (e.hp <= 0) {
      this.killEnemy(e);
    }
  }

  killEnemy(e) {
    const idx = this.enemies.indexOf(e);
    if (idx < 0) return;
    this.enemies.splice(idx, 1);
    this.kills++;
    if (e.isInfest) this.infestationKilled++;
    // v2: track loot goblin kill for achievement
    if (e.type === 'lootgoblin') this._killedGoblin = true;

    // combo
    this.combo = Math.min(3.5, this.combo + 0.08);
    this.comboTimer = 2.2;

    // explosion particles
    for (let i = 0; i < 14; i++) {
      this.particles.push(new Particle(e.x, e.y, {
        vx: rand(-1, 1) * 280, vy: rand(-1, 1) * 280,
        color: e.def.color, size: rand(3, 7), life: rand(0.3, 0.7),
        glow: true, drag: 0.85,
      }));
    }
    for (let i = 0; i < 6; i++) {
      this.particles.push(new Particle(e.x, e.y, {
        vx: rand(-1, 1) * 180, vy: rand(-1, 1) * 180,
        color: '#ffffff', size: rand(2, 4), life: 0.4,
      }));
    }
    G.cam.shake = Math.min(G.cam.shake + 1.5, 16);
    Audio.hit();

    // splitter logic
    if (e.def.splits) {
      for (let i = 0; i < e.def.splits; i++) {
        const ang = (i / e.def.splits) * TAU + rand(-0.4, 0.4);
        const dist = 25;
        const def = ENEMIES.swarmer;
        this.enemies.push({
          type: 'swarmer', def,
          x: e.x + Math.cos(ang) * dist, y: e.y + Math.sin(ang) * dist,
          vx: Math.cos(ang) * 80, vy: Math.sin(ang) * 80,
          hp: def.hp, maxHp: def.hp,
          radius: def.radius,
          fireCd: 0, slow: 0, flash: 0,
          spawnAnim: 0.3, facing: 0, trailCd: 0, despawn: 0,
        });
      }
    }

    // drops
    this.dropLoot(e);

    // life steal
    if (this.upgrades.killHeal > 0 && Math.random() < this.upgrades.killHeal) {
      this.player.hp = Math.min(this.player.maxHp, this.player.hp + 5);
      this.spawnText(this.player.x, this.player.y - 20, '+5', '#44ffaa');
    }

    // floating combo
    if (this.kills > 0 && this.kills % 10 === 0) {
      this.spawnText(e.x, e.y - 20, `${this.kills} KILLS`, '#ffc233', { size: 20 });
    }
  }

  dropLoot(e) {
    const def = e.def;
    const scrapCount = def.scrap + Math.floor(this.combo - 1) + (this.fx.goldUntil > this.time ? def.scrap : 0);
    for (let i = 0; i < scrapCount; i++) {
      this.loot.push({
        x: e.x + rand(-12, 12), y: e.y + rand(-12, 12),
        vx: rand(-200, 200), vy: rand(-200, 200),
        type: 'scrap', life: 10, bob: rand(0, TAU), r: 8,
      });
    }
    // core drop
    if (Math.random() < def.coreChance * this.upgrades.coreChance) {
      this.loot.push({
        x: e.x, y: e.y,
        vx: rand(-120, 120), vy: rand(-120, 120),
        type: 'core', life: 15, bob: rand(0, TAU), r: 10,
      });
    }
  }

  dealAOE(x, y, r, dmg, color = '#ffffff') {
    // visual ring
    for (let i = 0; i < 20; i++) {
      const ang = (i / 20) * TAU;
      this.particles.push(new Particle(x + Math.cos(ang) * 10, y + Math.sin(ang) * 10, {
        vx: Math.cos(ang) * 400, vy: Math.sin(ang) * 400,
        color, size: 5, life: 0.3, glow: true,
      }));
    }
    G.cam.shake = Math.min(G.cam.shake + 4, 20);
    for (const e of this.enemies.slice()) {
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < r + e.radius) this.damageEnemy(e, dmg, null);
    }
  }

  explodeBomber(e) {
    // big AOE
    this.dealAOE(e.x, e.y, 70, 0, '#ff7722');
    // damage player if close
    const d = Math.hypot(this.player.x - e.x, this.player.y - e.y);
    if (d < 100) {
      this.playerHurt(e.def.dmg);
    }
    // big explosion particles
    for (let i = 0; i < 30; i++) {
      this.particles.push(new Particle(e.x, e.y, {
        vx: rand(-1, 1) * 400, vy: rand(-1, 1) * 400,
        color: '#ff7722', size: rand(4, 10), life: rand(0.4, 0.8),
        glow: true, drag: 0.84,
      }));
    }
    Audio.hit();
    Audio.hurt();
    G.cam.shake = Math.min(G.cam.shake + 12, 30);
    // still drop scrap
    this.dropLoot(e);
    this.kills++;
    this.combo = Math.min(3.5, this.combo + 0.08);
    this.comboTimer = 2.2;
  }

  playerHurt(dmg) {
    if (this.player.invuln > 0) return;
    if (this.player.shield > 0) {
      this.player.shield--;
      this.player.invuln = 0.4;
      // shield break vis
      for (let i = 0; i < 20; i++) {
        const ang = (i / 20) * TAU;
        this.particles.push(new Particle(this.player.x, this.player.y, {
          vx: Math.cos(ang) * 280, vy: Math.sin(ang) * 280,
          color: '#a855ff', size: 5, life: 0.5,
        }));
      }
      Audio.dash();
      return;
    }
    this.player.hp -= dmg;
    this.player.invuln = 0.5;
    this.player.flashHurt = 1;
    this.questFlags.noHit = false;  // v2: any HP damage breaks the no-hit run
    G.cam.shake = Math.min(G.cam.shake + 8, 24);
    G.cam.flashHurt = 1;
    Audio.hurt();
    if (this.player.hp <= 0) {
      // auto revive
      if (this.upgrades.revives > 0) {
        this.upgrades.revives--;
        this.player.hp = this.player.maxHp * 0.3;
        this.player.invuln = 1.5;
        for (let i = 0; i < 40; i++) {
          const ang = (i / 40) * TAU;
          this.particles.push(new Particle(this.player.x, this.player.y, {
            vx: Math.cos(ang) * 400, vy: Math.sin(ang) * 400,
            color: '#44ffaa', size: 6, life: 0.7,
          }));
        }
        this.spawnText(this.player.x, this.player.y - 40, 'REVIVED', '#44ffaa', { size: 28, vy: -100, life: 1.5 });
        return;
      }
      this.endRun('death');
    }
  }

  applyPowerUp(pu) {
    this.spawnText(this.player.x, this.player.y - 30, pu.name, pu.color, { size: 20, vy: -90, life: 1.4 });
    Audio.powerup();
    G.cam.shake = Math.min(G.cam.shake + 4, 20);
    for (let i = 0; i < 30; i++) {
      const ang = (i / 30) * TAU;
      this.particles.push(new Particle(this.player.x, this.player.y, {
        vx: Math.cos(ang) * 300, vy: Math.sin(ang) * 300,
        color: pu.color, size: 5, life: 0.6,
      }));
    }
    switch (pu.id) {
      case 'magnet': {
        for (const l of this.loot) {
          const dx = this.player.x - l.x, dy = this.player.y - l.y;
          const d = Math.hypot(dx, dy) || 1;
          l.vx += (dx / d) * 1000;
          l.vy += (dy / d) * 1000;
        }
        break;
      }
      case 'nuke': {
        const enemies = this.enemies.slice();
        for (const e of enemies) this.damageEnemy(e, 9999, null);
        G.cam.shake = 24;
        break;
      }
      case 'laser': {
        this.fx.laserUntil = this.time + 6;
        break;
      }
      case 'time': {
        this.duration += 15;
        this.spawnText(this.player.x, this.player.y - 60, '+15s', '#44ffaa', { size: 24, vy: -120 });
        break;
      }
      case 'shield': {
        this.player.shield += 1;
        break;
      }
      case 'freeze': {
        this.fx.freezeUntil = this.time + 4;
        break;
      }
      case 'gold': {
        this.fx.goldUntil = this.time + 8;
        break;
      }
      case 'turret': {
        this.drones.push({
          x: this.player.x, y: this.player.y,
          angle: 0, fireCd: 0, temp: this.time + 10,
        });
        break;
      }
      // NEW v2: Drone Swarm — 4 temp drones for 12s
      case 'swarm': {
        const t = this.time + 12;
        for (let i = 0; i < 4; i++) {
          this.drones.push({
            x: this.player.x, y: this.player.y,
            angle: (i / 4) * TAU + Math.random() * 0.3, fireCd: i * 0.1, temp: t,
          });
        }
        this.spawnText(this.player.x, this.player.y - 60, 'SWARM ACTIVE', pu.color, { size: 18, vy: -100, life: 1.2 });
        break;
      }
    }
  }

  spawnText(x, y, text, color, opts = {}) {
    this.texts.push(new FloatText(x, y, text, { color, ...opts }));
  }

  endRun(type) {
    if (this.ended) return;
    this.ended = true;
    this.endType = type;
    G.paused = true;
    if (type === 'success') {
      Audio.extract();
      G.cam.shake = 12;
    } else if (type === 'death') {
      Audio.death();
      G.cam.shake = 30;
    } else if (type === 'timeout') {
      Audio.death();
    }
    setTimeout(() => showResults(this), 600);
  }

  // ===== RENDER =====
  render(ctx) {
    const W = G.W, H = G.H;

    // Camera shake
    const shakeX = (Math.random() - 0.5) * G.cam.shake;
    const shakeY = (Math.random() - 0.5) * G.cam.shake;
    const cx = G.cam.x + shakeX;
    const cy = G.cam.y + shakeY;

    ctx.save();
    ctx.translate(W / 2 - cx, H / 2 - cy);

    // background grid
    this.renderBg(ctx, cx, cy, W, H);

    // arena outline
    ctx.strokeStyle = 'rgba(34, 255, 238, 0.25)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#22ffee';
    ctx.shadowBlur = 12;
    ctx.strokeRect(this.arena.x, this.arena.y, this.arena.w, this.arena.h);
    ctx.shadowBlur = 0;
    // inner border
    ctx.strokeStyle = 'rgba(255, 45, 191, 0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(this.arena.x + 10, this.arena.y + 10, this.arena.w - 20, this.arena.h - 20);

    // extraction pad
    this.renderExtractPad(ctx);

    // loot
    for (const l of this.loot) this.renderLoot(ctx, l);
    // powerups
    for (const pu of this.powerups) this.renderPowerup(ctx, pu);

    // drones
    for (const d of this.drones) this.renderDrone(ctx, d);

    // enemies
    for (const e of this.enemies) this.renderEnemy(ctx, e);

    // enemy projectiles
    for (const ep of this.enemyProjs) {
      ctx.fillStyle = ep.color;
      ctx.shadowColor = ep.color;
      ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(ep.x, ep.y, 6, 0, TAU); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // player projectiles with glow trail
    for (const pr of this.projectiles) {
      ctx.strokeStyle = pr.color;
      ctx.lineWidth = 3;
      ctx.shadowColor = pr.color; ctx.shadowBlur = 16;
      ctx.beginPath();
      if (pr.trail.length > 1) {
        ctx.moveTo(pr.trail[0][0], pr.trail[0][1]);
        for (let i = 1; i < pr.trail.length; i++) ctx.lineTo(pr.trail[i][0], pr.trail[i][1]);
        ctx.lineTo(pr.x, pr.y);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(pr.x, pr.y, 3, 0, TAU); ctx.fill();
    }

    // player
    this.renderPlayer(ctx);

    // particles
    for (const p of this.particles) p.draw(ctx);

    // floating texts
    for (const t of this.texts) t.draw(ctx);

    // bomber telegraphs are drawn in renderEnemy

    ctx.restore();

    // overlay: minimap (corners of enemies)
    this.renderMinimap(ctx);
  }

  renderBg(ctx, cx, cy, W, H) {
    // synthwave grid: draws lines snapped to camera
    const grid = 80;
    const left = cx - W / 2 - grid;
    const right = cx + W / 2 + grid;
    const top = cy - H / 2 - grid;
    const bottom = cy + H / 2 + grid;
    const startX = Math.floor(left / grid) * grid;
    const endX = Math.ceil(right / grid) * grid;
    const startY = Math.floor(top / grid) * grid;
    const endY = Math.ceil(bottom / grid) * grid;
    ctx.lineWidth = 1;
    // distant subtle grid
    ctx.strokeStyle = 'rgba(255, 45, 191, 0.06)';
    ctx.beginPath();
    for (let x = startX; x <= endX; x += grid) {
      ctx.moveTo(x, top); ctx.lineTo(x, bottom);
    }
    for (let y = startY; y <= endY; y += grid) {
      ctx.moveTo(left, y); ctx.lineTo(right, y);
    }
    ctx.stroke();
    // big highlight grid
    ctx.strokeStyle = 'rgba(34, 255, 238, 0.04)';
    ctx.beginPath();
    for (let x = startX; x <= endX; x += grid * 4) {
      ctx.moveTo(x, top); ctx.lineTo(x, bottom);
    }
    for (let y = startY; y <= endY; y += grid * 4) {
      ctx.moveTo(left, y); ctx.lineTo(right, y);
    }
    ctx.stroke();
  }

  renderExtractPad(ctx) {
    const pad = this.extractPad;
    const open = this.time >= this.extractOpenAt;
    const pulse = 0.5 + 0.5 * Math.sin(this.time * 4);
    if (!open) {
      // closed pad
      ctx.strokeStyle = 'rgba(122, 138, 176, 0.45)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath(); ctx.arc(pad.x, pad.y, pad.r, 0, TAU); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(122, 138, 176, 0.65)';
      ctx.font = '900 12px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      const sec = Math.ceil(this.extractOpenAt - this.time);
      ctx.fillText(`EXTRACTION IN ${sec}s`, pad.x, pad.y);
    } else {
      // pulsing magenta pad
      ctx.shadowColor = '#ff2dbf';
      ctx.shadowBlur = 30 + pulse * 30;
      ctx.strokeStyle = '#ff2dbf';
      ctx.lineWidth = 3 + pulse * 2;
      ctx.beginPath(); ctx.arc(pad.x, pad.y, pad.r, 0, TAU); ctx.stroke();
      // inner ring
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255, 45, 191, 0.4)';
      ctx.beginPath(); ctx.arc(pad.x, pad.y, pad.r * 0.7, 0, TAU); ctx.stroke();
      ctx.shadowBlur = 0;
      // progress ring
      if (this.extractProgress > 0) {
        const frac = this.extractProgress / EXTRACT_HOLD_TIME;
        ctx.strokeStyle = '#22ffee';
        ctx.lineWidth = 6;
        ctx.shadowColor = '#22ffee';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(pad.x, pad.y, pad.r + 8, -Math.PI / 2, -Math.PI / 2 + TAU * frac);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // text
      ctx.fillStyle = '#ff2dbf';
      ctx.font = '900 11px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('EXTRACT', pad.x, pad.y - pad.r - 12);
      ctx.fillStyle = '#22ffee';
      ctx.font = '700 10px Share Tech Mono, monospace';
      ctx.fillText(`STAND FOR 5s`, pad.x, pad.y + pad.r + 18);
    }
  }

  renderLoot(ctx, l) {
    const bob = Math.sin(l.bob * 4) * 3;
    if (l.type === 'scrap') {
      ctx.save();
      ctx.translate(l.x, l.y + bob);
      ctx.rotate(l.bob);
      ctx.fillStyle = '#ffc233';
      ctx.shadowColor = '#ffc233';
      ctx.shadowBlur = 12;
      const s = 7;
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(-s / 2, -s / 2, s, s);
      ctx.restore();
    } else if (l.type === 'core') {
      ctx.save();
      ctx.translate(l.x, l.y + bob);
      ctx.rotate(l.bob * 2);
      ctx.fillStyle = '#44ffaa';
      ctx.shadowColor = '#44ffaa';
      ctx.shadowBlur = 20;
      const s = 12;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s, 0);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.stroke();
      // inner sparkle
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, TAU);
      ctx.fill();
      ctx.restore();
    }
  }

  renderPowerup(ctx, pu) {
    const bob = Math.sin(pu.bob * 3) * 4;
    const pulse = 0.5 + 0.5 * Math.sin(pu.bob * 5);
    ctx.save();
    ctx.translate(pu.x, pu.y + bob);
    // outer ring
    ctx.strokeStyle = pu.type.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = pu.type.color;
    ctx.shadowBlur = 20 + pulse * 15;
    ctx.beginPath();
    ctx.arc(0, 0, pu.r, 0, TAU);
    ctx.stroke();
    // inner hex
    ctx.fillStyle = pu.type.color;
    ctx.globalAlpha = 0.2 + pulse * 0.2;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU + pu.bob * 0.5;
      const r = pu.r * 0.6;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    // icon letter
    ctx.fillStyle = pu.type.color;
    ctx.font = '900 16px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.type.icon, 0, 1);
    ctx.restore();
  }

  renderDrone(ctx, d) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(this.time * 4);
    ctx.fillStyle = d.temp ? '#44ffaa' : '#22ffee';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    const sz = 7;
    ctx.moveTo(sz, 0);
    ctx.lineTo(-sz * 0.6, sz * 0.6);
    ctx.lineTo(-sz * 0.6, -sz * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  renderEnemy(ctx, e) {
    const flash = e.flash > 0;
    const spawnAlpha = 1 - e.spawnAnim / 0.4;
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.globalAlpha = clamp(spawnAlpha, 0.3, 1);

    if (e.def.bomber && e.bombTimer !== null && e.bombTimer >= 0) {
      // pulsing telegraph
      const pulse = 0.5 + 0.5 * Math.sin(this.time * 25);
      ctx.fillStyle = '#ff7722';
      ctx.shadowColor = '#ff7722';
      ctx.shadowBlur = 20 + pulse * 30;
      ctx.beginPath();
      ctx.arc(0, 0, e.radius * (1 + pulse * 0.3), 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = flash ? '#ffffff' : e.def.color;
      ctx.shadowColor = e.def.glow;
      ctx.shadowBlur = 12;
      // shapes
      switch (e.type) {
        case 'grunt': {
          // square
          ctx.fillRect(-e.radius, -e.radius, e.radius * 2, e.radius * 2);
          break;
        }
        case 'swarmer': {
          ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, TAU); ctx.fill();
          break;
        }
        case 'tank': {
          // hexagon
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * TAU;
            const x = Math.cos(a) * e.radius;
            const y = Math.sin(a) * e.radius;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'shooter': {
          // triangle
          ctx.beginPath();
          ctx.moveTo(e.radius, 0);
          ctx.lineTo(-e.radius * 0.7, e.radius * 0.8);
          ctx.lineTo(-e.radius * 0.7, -e.radius * 0.8);
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'bomber': {
          ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, TAU); ctx.fill();
          break;
        }
        case 'splitter': {
          ctx.beginPath();
          for (let i = 0; i < 4; i++) {
            const a = (i / 4) * TAU + Math.PI / 4;
            const x = Math.cos(a) * e.radius;
            const y = Math.sin(a) * e.radius;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'infest': {
          // spiky shape
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * TAU;
            const r = e.radius * (i % 2 === 0 ? 1 : 0.5);
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'lootgoblin': {
          // shimmering diamond with bigger glow
          const pulse = 0.6 + 0.4 * Math.sin(this.time * 9 + e.x * 0.01);
          ctx.shadowBlur = 28 + pulse * 14;
          ctx.beginPath();
          ctx.moveTo(0, -e.radius * 1.1);
          ctx.lineTo(e.radius, 0);
          ctx.lineTo(0, e.radius * 1.1);
          ctx.lineTo(-e.radius, 0);
          ctx.closePath();
          ctx.fill();
          // gold "$" sigil
          ctx.fillStyle = '#fff8cc';
          ctx.font = '900 14px Orbitron, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$', 0, 0);
          break;
        }
        case 'shielded': {
          // diamond body
          ctx.beginPath();
          ctx.moveTo(0, -e.radius);
          ctx.lineTo(e.radius * 0.9, 0);
          ctx.lineTo(0, e.radius);
          ctx.lineTo(-e.radius * 0.9, 0);
          ctx.closePath(); ctx.fill();
          // shield arc in front
          ctx.shadowBlur = 16;
          ctx.shadowColor = '#a8c8ff';
          ctx.strokeStyle = 'rgba(168, 200, 255, 0.9)';
          ctx.lineWidth = 4;
          ctx.beginPath();
          const arc = e.def.shieldArc;
          ctx.arc(0, 0, e.radius + 8, e.facing - arc/2, e.facing + arc/2);
          ctx.stroke();
          ctx.lineWidth = 1;
          break;
        }
        case 'jammer': {
          // pulsing octagon
          const pulse = 0.5 + 0.5 * Math.sin(this.time * 8);
          ctx.shadowBlur = 20 + pulse * 20;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * TAU + this.time * 0.3;
            const r = e.radius * (1 + pulse * 0.08);
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath(); ctx.fill();
          // jamming rings
          ctx.strokeStyle = 'rgba(255, 68, 136, 0.5)';
          ctx.lineWidth = 1.5;
          for (let k = 0; k < 2; k++) {
            const rr = e.radius + 12 + k * 10 + pulse * 6;
            ctx.beginPath(); ctx.arc(0, 0, rr, 0, TAU); ctx.stroke();
          }
          break;
        }
      }
      ctx.shadowBlur = 0;

      // inner highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(0, -e.radius * 0.3, e.radius * 0.3, 0, TAU);
      ctx.fill();
    }
    // hp bar above
    if (e.hp < e.maxHp) {
      const w = e.radius * 2;
      const h = 3;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(-w / 2, -e.radius - 10, w, h);
      ctx.fillStyle = '#ff3355';
      ctx.fillRect(-w / 2, -e.radius - 10, w * (e.hp / e.maxHp), h);
    }
    ctx.restore();
  }

  renderPlayer(ctx) {
    const p = this.player;
    const flash = p.invuln > 0 && Math.floor(p.invuln * 25) % 2 === 0;
    ctx.save();
    ctx.translate(p.x, p.y);

    // outer ring (shield)
    if (p.shield > 0) {
      ctx.strokeStyle = '#a855ff';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#a855ff';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(0, 0, p.r + 8, 0, TAU);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // slow field
    if (this.upgrades.slowField) {
      ctx.strokeStyle = 'rgba(34, 255, 238, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, 200, 0, TAU); ctx.stroke();
    }
    // magnet circle when active
    if (Math.floor(this.time * 4) % 2 === 0) {
      ctx.strokeStyle = 'rgba(34, 255, 238, 0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, BASE_PICKUP_RADIUS * this.upgrades.magnetMult, 0, TAU); ctx.stroke();
    }
    // body
    ctx.rotate(p.facing);
    ctx.fillStyle = flash ? '#ffffff' : '#22ffee';
    ctx.shadowColor = '#22ffee';
    ctx.shadowBlur = 20;
    // diamond/arrow shape
    ctx.beginPath();
    ctx.moveTo(p.r, 0);
    ctx.lineTo(-p.r * 0.6, p.r * 0.8);
    ctx.lineTo(-p.r * 0.3, 0);
    ctx.lineTo(-p.r * 0.6, -p.r * 0.8);
    ctx.closePath();
    ctx.fill();
    // inner core
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, p.r * 0.3, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  renderMinimap(ctx) {
    const mw = 140, mh = 100;
    const mx = G.W - mw - 18, my = 110;
    const arenaScale = mw / this.arena.w;
    ctx.save();
    ctx.fillStyle = 'rgba(5,3,12,0.6)';
    ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = 'rgba(34,255,238,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, my, mw, mh);
    // map enemies
    for (const e of this.enemies) {
      const rx = mx + (e.x - this.arena.x) * arenaScale;
      const ry = my + (e.y - this.arena.y) * (mh / this.arena.h);
      ctx.fillStyle = e.def.color;
      ctx.fillRect(rx - 1, ry - 1, 2, 2);
    }
    // pad
    const padx = mx + (this.extractPad.x - this.arena.x) * arenaScale;
    const pady = my + (this.extractPad.y - this.arena.y) * (mh / this.arena.h);
    ctx.fillStyle = this.time >= this.extractOpenAt ? '#ff2dbf' : '#7a8ab0';
    ctx.fillRect(padx - 2, pady - 2, 4, 4);
    // player
    const ppx = mx + (this.player.x - this.arena.x) * arenaScale;
    const ppy = my + (this.player.y - this.arena.y) * (mh / this.arena.h);
    ctx.fillStyle = '#22ffee';
    ctx.beginPath();
    ctx.arc(ppx, ppy, 3, 0, TAU);
    ctx.fill();
    ctx.restore();
  }
}

// ---------- HUD UPDATE ----------
function updateHUD() {
  const r = G.raid;
  if (!r) return;
  document.getElementById('hud-scrap').textContent = fmtNum(r.scrap);
  document.getElementById('hud-cores').textContent = r.cores;
  document.getElementById('hud-hp').textContent = Math.max(0, Math.ceil(r.player.hp));
  const hpFrac = clamp(r.player.hp / r.player.maxHp, 0, 1);
  document.getElementById('hud-hp-bar').style.transform = `scaleX(${hpFrac})`;

  const remaining = Math.max(0, r.duration - r.time);
  document.getElementById('hud-time').textContent = Math.ceil(remaining);
  const timeFrac = clamp(1 - r.time / r.duration, 0, 1);
  document.getElementById('hud-time-bar').style.transform = `scaleX(${timeFrac})`;

  // dash
  const dashLeft = Math.max(0, r.player.dashCd);
  const dashEl = document.getElementById('hud-dash');
  dashEl.textContent = dashLeft <= 0 ? 'READY' : dashLeft.toFixed(1) + 's';
  dashEl.style.color = dashLeft <= 0 ? 'var(--cyan)' : 'var(--ink-dim)';
  const dashBase = BASE_DASH_CD * r.upgrades.dashCdMult;
  document.getElementById('hud-dash-bar').style.transform = `scaleX(${1 - dashLeft / dashBase})`;

  // combo
  const comboPanel = document.getElementById('hud-combo-panel');
  if (r.combo > 1.01) {
    comboPanel.style.display = '';
    document.getElementById('hud-combo').textContent = 'x' + r.combo.toFixed(2);
  } else {
    comboPanel.style.display = 'none';
  }

  // big combo display when high
  const big = document.getElementById('combo-big');
  if (r.combo >= 1.5) {
    big.textContent = 'x' + r.combo.toFixed(1);
    big.classList.add('show');
    big.style.fontSize = (44 + r.combo * 12) + 'px';
    big.style.opacity = clamp(r.combo / 4, 0.3, 0.7);
  } else {
    big.classList.remove('show');
  }

  // extract
  const ext = document.getElementById('hud-extract');
  if (r.time >= r.extractOpenAt) {
    ext.style.display = '';
    document.getElementById('hud-extract-val').textContent = `x${r.greed.toFixed(2)} GREED`;
    document.getElementById('hud-extract-bar').style.transform = `scaleX(${r.extractProgress / EXTRACT_HOLD_TIME})`;
  } else {
    ext.style.display = 'none';
  }

  // greed banner
  const gb = document.getElementById('greed-banner');
  if (r.time >= r.extractOpenAt) {
    gb.classList.add('show');
    gb.textContent = `GREED ×${r.greed.toFixed(2)}`;
    if (r.greed >= 2) gb.classList.add('high'); else gb.classList.remove('high');
  } else {
    gb.classList.remove('show');
  }

  // chroma intensity
  const chroma = document.getElementById('chroma');
  chroma.classList.remove('greed1', 'greed2', 'greed3', 'hurt', 'storm');
  if (G.cam.flashHurt > 0.4) chroma.classList.add('hurt');
  else if (r.greed >= 2.5) chroma.classList.add('greed3');
  else if (r.greed >= 1.7) chroma.classList.add('greed2');
  else if (r.greed >= 1.1) chroma.classList.add('greed1');
  if (r.arenaMods && r.arenaMods.stormMode) chroma.classList.add('storm');

  // v2 firewall wave warning
  const infestHost = document.getElementById('infest-warn-host');
  let warnHtml = '';
  if (r.firewallWarnT > 0 && !r.ended) {
    warnHtml += `<div class="firewall-warn">⚠ FIREWALL WAVE INCOMING ⚠</div>`;
  } else if (r.jammerActive && r.time >= r.extractOpenAt && !r.ended) {
    warnHtml += `<div class="infest-warn">⚠ EXTRACT JAMMER ON PAD ⚠</div>`;
  }
  // only write when our warning changes — don't trample external infestation HTML on first frame
  if (warnHtml && warnHtml !== infestHost.dataset.last) {
    infestHost.innerHTML = warnHtml;
    infestHost.dataset.last = warnHtml;
  } else if (!warnHtml && infestHost.dataset.last) {
    infestHost.innerHTML = '';
    infestHost.dataset.last = '';
  }

  // tutorial tips
  if (r.tutorial) {
    updateTutorialTip(r);
  }
}

function updateTutorialTip(r) {
  const host = document.getElementById('tip-host');
  let html = '';
  if (r.time < 4) {
    html = `Move with <span class="tip-key">WASD</span> or <span class="tip-key">↑←↓→</span>. The factory needs your scrap.`;
  } else if (r.time < 9) {
    html = `You auto-fire at the nearest enemy. Just <strong>survive</strong> and <strong>position</strong>.`;
  } else if (r.time < 14) {
    html = `Dash with <span class="tip-key">SPACE</span> for a quick burst of invulnerability. Cooldown: 1.15s.`;
  } else if (r.time < r.extractOpenAt) {
    html = `Pick up the <span style="color: var(--magenta)">glowing power-up</span> for a boost.`;
  } else if (r.extractProgress < EXTRACT_HOLD_TIME) {
    html = `Stand on the <span style="color: var(--magenta)">EXTRACT</span> pad for 5 seconds to bank your loot.`;
  }
  if (html) {
    host.innerHTML = `<div class="tip">${html}</div>`;
  } else {
    host.innerHTML = '';
  }
}

// ---------- DRAFT MODAL ----------
let _draftTimer = 0;
function triggerDraft() {
  G.paused = true;
  const picks = rollDraft();
  const draft = document.getElementById('draft');
  const cards = document.getElementById('draft-cards');
  cards.innerHTML = '';
  picks.forEach(u => {
    const card = document.createElement('div');
    card.className = 'draft-card ' + u.rarity;
    card.innerHTML = `
      <div class="draft-rarity ${u.rarity}">${u.rarity.toUpperCase()}</div>
      <div class="draft-icon">${u.icon}</div>
      <div class="draft-name">${u.name}</div>
      <div class="draft-desc">${u.desc}</div>
    `;
    card.onclick = () => pickDraft(u);
    cards.appendChild(card);
  });
  draft.classList.add('active');
  _draftTimer = 8;
  document.getElementById('draft-timer').textContent = `AUTO-SELECT IN ${_draftTimer}s`;
}
function pickDraft(u) {
  u.apply(G.raid);
  G.raid.spawnText(G.raid.player.x, G.raid.player.y - 50, u.name, '#22ffee', { size: 22, vy: -80, life: 1.5 });
  document.getElementById('draft').classList.remove('active');
  G.paused = false;
}
setInterval(() => {
  if (document.getElementById('draft').classList.contains('active')) {
    _draftTimer -= 1;
    if (_draftTimer <= 0) {
      // auto-pick first card
      const card = document.querySelector('.draft-card');
      if (card) card.click();
    } else {
      document.getElementById('draft-timer').textContent = `AUTO-SELECT IN ${_draftTimer}s`;
    }
  }
}, 1000);

// ---------- RESULTS SCREEN ----------
async function showResults(r) {
  const success = r.endType === 'success';
  const tut = r.tutorial;

  // calculate rewards
  let scrapEarned = Math.floor(r.scrap);
  let coresEarned = r.cores;
  if (success) {
    scrapEarned = Math.floor(scrapEarned * r.greed);
  } else {
    scrapEarned = Math.floor(scrapEarned * 0.5);
    coresEarned = Math.floor(coresEarned * 0.5);
  }

  // v2: apply storage cap - overflow accumulates in storageBuf at half rate
  const cap = getStorageCap();
  const totalNow = Storage.data.scrap + scrapEarned;
  let storageOverflow = 0;
  if (totalNow > cap) {
    const over = totalNow - cap;
    storageOverflow = Math.floor(over * 0.5);  // half loss when over capacity
    Storage.data.scrap = cap;
    scrapEarned -= storageOverflow; // visible amount in modal reflects what actually landed
  } else {
    Storage.data.scrap = totalNow;
  }
  Storage.data.cores += coresEarned;
  Storage.data.totalScrap += scrapEarned;
  Storage.data.totalCores += coresEarned;
  Storage.data.totalKills += r.kills;
  if (success) Storage.data.totalExtracts = (Storage.data.totalExtracts || 0) + 1;
  if (!tut) {
    Storage.data.raidCount += 1;
    if (scrapEarned > Storage.data.bestRun) Storage.data.bestRun = scrapEarned;
  }

  // v2 daily quest progress
  let questCompleted = false;
  const dq = getDailyQuest();
  const dayState = Storage.data.daily;
  if (!tut && !dayState.questClaimed) {
    let inc = 0;
    switch (dq.track) {
      case 'extract': if (success) inc = 1; break;
      case 'greed2':  if (success && r.greed >= 2.0) inc = 1; break;
      case 'kill':    inc = r.kills; break;
      case 'cores_run': if (r.questFlags.coresThisRun >= dq.target) inc = dq.target - dayState.questProgress; break;
      case 'clear_inf': if (success && Storage.data.infested.length === 0) inc = 1; break;
      case 'no_hit':  if (success && r.questFlags.noHit) inc = 1; break;
    }
    if (inc > 0) {
      dayState.questProgress = Math.min(dq.target, dayState.questProgress + inc);
      if (dayState.questProgress >= dq.target) questCompleted = true;
    }
  }

  // infestation logic
  let infestedNow = [];
  if (!success && !tut) {
    if (Storage.data.protectedFails < 3) {
      Storage.data.protectedFails++;
    } else {
      // v2: Bulwark operator halves infestation chance
      const bulwark = Storage.data.operatorId === 'bulwark';
      if (!bulwark || Math.random() < 0.5) {
        const machines = Object.keys(Storage.data.machines).filter(k => Storage.data.machines[k] > 0 && !Storage.data.infested.includes(k));
        const maxCount = Math.floor(machines.length / 2);
        const want = Math.min(maxCount - Storage.data.infested.length, randInt(1, 3));
        for (let i = 0; i < want; i++) {
          if (machines.length === 0) break;
          const idx = randInt(0, machines.length - 1);
          infestedNow.push(machines[idx]);
          Storage.data.infested.push(machines[idx]);
          machines.splice(idx, 1);
        }
      }
    }
    Storage.data.failStreak++;
  } else if (success) {
    Storage.data.failStreak = 0;
  }

  if (tut) Storage.data.tutorialDone = true;
  Storage.data.lastSeen = Date.now();
  await Storage.save();

  // achievements: check after stats are saved (loot goblin marker passed via extraIds)
  const extra = [];
  if (r._killedGoblin) extra.push('goblin');
  checkAchievements(extra);

  // build modal
  const res = document.getElementById('results');
  const title = success ? 'EXTRACTION SUCCESS' : (r.endType === 'death' ? 'OPERATIVE DOWN' : 'RAID TIMEOUT');
  const titleClass = success ? 'success' : 'fail';

  let infestHtml = '';
  if (infestedNow.length > 0) {
    infestHtml = `<div class="results-line hot"><span style="color:var(--red)">FACTORY INFESTED</span><span class="v" style="color:var(--red)">${infestedNow.length} machine${infestedNow.length > 1 ? 's' : ''}</span></div>`;
  }
  let overflowHtml = '';
  if (storageOverflow > 0) {
    overflowHtml = `<div class="results-line hot"><span style="color:var(--red)">STORAGE OVERFLOW</span><span class="v" style="color:var(--red)">-${fmtNum(storageOverflow)}</span></div>`;
  }
  let questHtml = '';
  if (questCompleted) {
    questHtml = `<div class="results-line hot"><span style="color:var(--amber)">DAILY QUEST COMPLETE</span><span class="v" style="color:var(--amber)">CLAIMABLE</span></div>`;
  }

  res.innerHTML = `
    <div class="results-card">
      <div class="results-title ${titleClass}">${title}</div>
      <div class="results-line"><span>KILLS</span><span class="v">${r.kills}</span></div>
      <div class="results-line"><span>RUN SCRAP</span><span class="v" style="color:var(--amber)">${fmtNum(r.scrap)}</span></div>
      ${success ? `<div class="results-line hot"><span>GREED MULTIPLIER</span><span class="v" style="color:var(--magenta)">×${r.greed.toFixed(2)}</span></div>` : `<div class="results-line"><span>LOOT KEPT</span><span class="v" style="color:var(--red)">50%</span></div>`}
      <div class="results-line"><span>SCRAP BANKED</span><span class="v" style="color:var(--amber)">${fmtNum(scrapEarned)}</span></div>
      ${coresEarned > 0 ? `<div class="results-line"><span>CORES BANKED</span><span class="v" style="color:var(--green)">${coresEarned}</span></div>` : ''}
      ${overflowHtml}
      ${questHtml}
      ${infestHtml}
      <button class="menu-btn primary" onclick="window._continueAfterResults()">RETURN TO FACTORY</button>
    </div>
  `;
  res.classList.add('active');
}

window._continueAfterResults = () => {
  document.getElementById('results').classList.remove('active');
  G.raid = null;
  G.paused = false;
  document.getElementById('hud').classList.remove('active');
  document.getElementById('chroma').className = 'chroma';
  showFactory();
};

    unlock: () => true,
