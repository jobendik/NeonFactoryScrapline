<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON FACTORY RAID — v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #05030c;
    --bg-1: #0a0820;
    --bg-2: #14092c;
    --cyan: #22ffee;
    --cyan-dim: #0aa9a0;
    --magenta: #ff2dbf;
    --magenta-dim: #b81788;
    --amber: #ffc233;
    --amber-dim: #b88a1f;
    --red: #ff3355;
    --green: #44ffaa;
    --purple: #a855ff;
    --ink: #e8f4ff;
    --ink-dim: #7a8ab0;
    --grid: rgba(255, 45, 191, 0.08);
    --panel: rgba(10, 8, 32, 0.85);
    --border: rgba(34, 255, 238, 0.25);
    --border-hot: rgba(255, 45, 191, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
    overscroll-behavior: none;
  }

  #app {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg-0) 70%);
  }

  #canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  /* ============ SCANLINES + VIGNETTE OVERLAY ============ */
  .scanlines {
    position: absolute; inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.18) 0px,
      rgba(0,0,0,0.18) 1px,
      transparent 1px,
      transparent 3px);
    z-index: 50;
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 50%,
      rgba(0,0,0,0.55) 100%);
    z-index: 51;
  }
  .chroma {
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 80px rgba(255, 45, 191, 0.0);
    z-index: 52;
    transition: box-shadow 0.4s ease;
  }
  .chroma.greed1 { box-shadow: inset 0 0 100px rgba(255, 195, 51, 0.25); }
  .chroma.greed2 { box-shadow: inset 0 0 130px rgba(255, 100, 51, 0.35); }
  .chroma.greed3 { box-shadow: inset 0 0 180px rgba(255, 45, 191, 0.55); animation: pulse-hot 1s infinite; }
  .chroma.hurt { box-shadow: inset 0 0 200px rgba(255, 51, 85, 0.7); }
  @keyframes pulse-hot {
    0%, 100% { box-shadow: inset 0 0 180px rgba(255, 45, 191, 0.55); }
    50% { box-shadow: inset 0 0 220px rgba(255, 45, 191, 0.75); }
  }

  /* ============ HUD (RAID) ============ */
  #hud {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 30;
    display: none;
  }
  #hud.active { display: block; }

  .hud-top {
    position: absolute; top: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    position: relative;
  }
  .panel.hot { border-color: var(--border-hot); }

  .label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(34, 255, 238, 0.6);
    letter-spacing: 0.04em;
  }
  .value.amber { color: var(--amber); text-shadow: 0 0 12px rgba(255, 194, 51, 0.6); }
  .value.green { color: var(--green); text-shadow: 0 0 12px rgba(68, 255, 170, 0.6); }
  .value.magenta { color: var(--magenta); text-shadow: 0 0 14px rgba(255, 45, 191, 0.7); }
  .value.red { color: var(--red); text-shadow: 0 0 14px rgba(255, 51, 85, 0.7); }
  .value.huge { font-size: 38px; }

  .row { display: flex; gap: 10px; align-items: stretch; }

  .timer-bar-wrap {
    width: 220px;
  }
  .bar {
    position: relative;
    height: 8px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    margin-top: 6px;
  }
  .bar-fill {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow: 0 0 10px var(--cyan);
    transform-origin: left;
    transition: transform 0.1s linear;
  }
  .bar-fill.hp {
    background: linear-gradient(90deg, var(--green), var(--amber));
    box-shadow: 0 0 10px var(--green);
  }
  .bar-fill.extract {
    background: linear-gradient(90deg, var(--magenta), var(--amber));
    box-shadow: 0 0 14px var(--magenta);
  }
  .bar-fill.dash {
    background: linear-gradient(90deg, var(--purple), var(--cyan));
  }

  .hud-bottom {
    position: absolute; bottom: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 12px;
  }

  .combo-display {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 64px;
    color: var(--amber);
    text-shadow: 0 0 24px rgba(255, 194, 51, 0.8), 0 0 48px rgba(255, 100, 0, 0.5);
    letter-spacing: 0.05em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 31;
  }
  .combo-display.show { opacity: 0.7; }

  .greed-banner {
    position: absolute; top: 90px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: var(--magenta);
    text-shadow: 0 0 16px var(--magenta);
    padding: 8px 24px;
    border: 1px solid var(--magenta);
    background: rgba(255, 45, 191, 0.1);
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .greed-banner.show { opacity: 1; }
  .greed-banner.high { animation: greed-pulse 0.6s infinite; }
  @keyframes greed-pulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.08); }
  }

  /* ============ MENU / FACTORY UI ============ */
  #screen {
    position: absolute; inset: 0;
    z-index: 40;
    display: flex;
    flex-direction: column;
    background: radial-gradient(ellipse at top, var(--bg-2), var(--bg-0) 60%);
    overflow: hidden;
  }
  #screen.hidden { display: none; }

  .screen-bg {
    position: absolute; inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .screen-bg::before {
    content: '';
    position: absolute; inset: -10%;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(800px) rotateX(60deg) translateY(20%);
    transform-origin: center bottom;
    mask-image: linear-gradient(180deg, transparent, black 30%, black 80%, transparent);
    -webkit-mask-image: linear-gradient(180deg, transparent, black 30%, black 80%, transparent);
    animation: grid-scroll 8s linear infinite;
  }
  @keyframes grid-scroll {
    from { background-position: 0 0; }
    to { background-position: 0 60px; }
  }
  .screen-bg::after {
    content: '';
    position: absolute;
    top: 35%; left: 50%;
    transform: translateX(-50%);
    width: 200%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--magenta), transparent);
    box-shadow: 0 0 40px var(--magenta), 0 0 120px rgba(255, 45, 191, 0.4);
  }

  /* Title screen */
  .title-screen {
    position: relative;
    z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 40px;
    text-align: center;
  }

  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(48px, 9vw, 120px);
    letter-spacing: 0.08em;
    line-height: 0.9;
    background: linear-gradient(180deg, var(--cyan) 0%, var(--magenta) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(34, 255, 238, 0.4)) drop-shadow(0 0 40px rgba(255, 45, 191, 0.4));
    margin-bottom: 8px;
    position: relative;
  }
  .game-title::before {
    content: 'NEON FACTORY';
    position: absolute; inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px rgba(34, 255, 238, 0.2);
    transform: translate(-3px, 3px);
    z-index: -1;
  }
  .game-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 8vw, 100px);
    color: var(--magenta);
    text-shadow: 0 0 30px var(--magenta), 0 0 60px rgba(255, 45, 191, 0.4);
    letter-spacing: 0.1em;
    margin-bottom: 30px;
  }
  .tagline {
    font-family: 'Share Tech Mono', monospace;
    color: var(--ink-dim);
    font-size: 14px;
    letter-spacing: 0.2em;
    margin-bottom: 48px;
    max-width: 560px;
  }

  .menu-btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.18em;
    color: var(--ink);
    background: rgba(34, 255, 238, 0.08);
    border: 1px solid var(--cyan);
    padding: 16px 48px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0 50%);
    pointer-events: auto;
    margin: 6px;
    position: relative;
  }
  .menu-btn:hover {
    background: var(--cyan);
    color: var(--bg-0);
    box-shadow: 0 0 30px var(--cyan);
    transform: scale(1.03);
  }
  .menu-btn.primary {
    border-color: var(--magenta);
    background: rgba(255, 45, 191, 0.15);
    color: var(--magenta);
    font-size: 18px;
    padding: 20px 56px;
    box-shadow: 0 0 20px rgba(255, 45, 191, 0.3);
  }
  .menu-btn.primary:hover {
    background: var(--magenta);
    color: var(--ink);
    box-shadow: 0 0 40px var(--magenta);
  }
  .menu-btn:disabled, .menu-btn[disabled] {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ============ FACTORY SCREEN ============ */
  .factory-screen {
    position: relative;
    z-index: 1;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 20px;
    gap: 16px;
  }

  .factory-header {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
  }
  .currency-row {
    display: flex; gap: 12px;
  }
  .currency {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    min-width: 140px;
  }
  .currency-icon {
    width: 22px; height: 22px;
    border-radius: 2px;
  }
  .currency-icon.scrap { background: var(--amber); box-shadow: 0 0 12px var(--amber); transform: rotate(45deg); }
  .currency-icon.core {
    background: var(--green); box-shadow: 0 0 14px var(--green);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  .currency-label { font-size: 9px; letter-spacing: 0.2em; color: var(--ink-dim); text-transform: uppercase; }
  .currency-value { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px; color: var(--ink); }
  .currency-value.amber { color: var(--amber); }
  .currency-value.green { color: var(--green); }

  .factory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    overflow-y: auto;
    padding: 4px;
    align-content: start;
  }
  .factory-grid::-webkit-scrollbar { width: 6px; }
  .factory-grid::-webkit-scrollbar-thumb { background: var(--border); }

  .machine {
    position: relative;
    background: linear-gradient(135deg, rgba(34, 255, 238, 0.04), rgba(255, 45, 191, 0.04));
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    transition: all 0.2s;
    cursor: pointer;
    pointer-events: auto;
  }
  .machine:hover {
    border-color: var(--cyan);
    background: linear-gradient(135deg, rgba(34, 255, 238, 0.12), rgba(255, 45, 191, 0.08));
    transform: translateY(-2px);
  }
  .machine.locked {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .machine.infested {
    border-color: var(--red);
    background: linear-gradient(135deg, rgba(255, 51, 85, 0.15), rgba(160, 30, 50, 0.1));
    animation: infest-pulse 1.5s infinite;
  }
  @keyframes infest-pulse {
    0%, 100% { box-shadow: inset 0 0 30px rgba(255, 51, 85, 0.1); }
    50% { box-shadow: inset 0 0 50px rgba(255, 51, 85, 0.3); }
  }

  .machine-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .machine-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .machine-level {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 12px;
    color: var(--cyan);
    background: rgba(34, 255, 238, 0.1);
    padding: 2px 8px;
    border: 1px solid var(--border);
  }
  .machine-desc { font-size: 11px; color: var(--ink-dim); line-height: 1.4; min-height: 30px; }
  .machine-bonus {
    font-size: 11px;
    color: var(--amber);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
  }
  .machine-upgrade-btn {
    margin-top: 6px;
    padding: 8px;
    background: rgba(255, 45, 191, 0.1);
    border: 1px solid var(--border-hot);
    color: var(--magenta);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    text-transform: uppercase;
    pointer-events: auto;
  }
  .machine-upgrade-btn:hover:not(:disabled) {
    background: var(--magenta);
    color: var(--ink);
    box-shadow: 0 0 16px var(--magenta);
  }
  .machine-upgrade-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
  }

  .factory-footer {
    display: flex; justify-content: center; align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }

  /* ============ DRAFT MODAL ============ */
  #draft {
    position: absolute; inset: 0;
    z-index: 60;
    background: rgba(5, 3, 12, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 24px;
    padding: 20px;
  }
  #draft.active { display: flex; }
  .draft-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.25em;
    color: var(--magenta);
    text-shadow: 0 0 24px var(--magenta);
    text-align: center;
  }
  .draft-cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  .draft-card {
    width: 240px;
    padding: 24px;
    background: linear-gradient(180deg, rgba(34, 255, 238, 0.08), rgba(255, 45, 191, 0.08));
    border: 2px solid var(--border);
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: center;
    pointer-events: auto;
  }
  .draft-card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: var(--cyan);
    box-shadow: 0 0 40px rgba(34, 255, 238, 0.4);
  }
  .draft-card.rare { border-color: rgba(168, 85, 255, 0.5); }
  .draft-card.rare:hover { border-color: var(--purple); box-shadow: 0 0 40px var(--purple); }
  .draft-card.epic { border-color: rgba(255, 194, 51, 0.6); }
  .draft-card.epic:hover { border-color: var(--amber); box-shadow: 0 0 40px var(--amber); }
  .draft-rarity {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 9px; letter-spacing: 0.3em;
    color: var(--ink-dim); text-transform: uppercase;
  }
  .draft-rarity.rare { color: var(--purple); }
  .draft-rarity.epic { color: var(--amber); }
  .draft-icon {
    font-family: 'Major Mono Display', monospace;
    font-size: 56px;
    color: var(--cyan);
    text-shadow: 0 0 16px var(--cyan);
    line-height: 1;
    margin: 8px 0;
  }
  .draft-card.rare .draft-icon { color: var(--purple); text-shadow: 0 0 16px var(--purple); }
  .draft-card.epic .draft-icon { color: var(--amber); text-shadow: 0 0 18px var(--amber); }
  .draft-name {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: 0.1em;
    color: var(--ink); text-transform: uppercase;
  }
  .draft-desc { font-size: 12px; color: var(--ink-dim); line-height: 1.5; min-height: 50px; }

  .draft-timer {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
  }

  /* ============ RESULTS / EXTRACTION SCREEN ============ */
  #results {
    position: absolute; inset: 0;
    z-index: 55;
    background: rgba(5, 3, 12, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #results.active { display: flex; }
  .results-card {
    width: min(540px, 100%);
    padding: 36px;
    background: linear-gradient(180deg, rgba(34, 255, 238, 0.05), rgba(255, 45, 191, 0.05));
    border: 1px solid var(--border);
    clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
    display: flex; flex-direction: column; gap: 16px;
  }
  .results-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: 0.15em;
    text-align: center;
  }
  .results-title.success { color: var(--green); text-shadow: 0 0 24px var(--green); }
  .results-title.fail { color: var(--red); text-shadow: 0 0 24px var(--red); }
  .results-line {
    display: flex; justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border-left: 2px solid var(--cyan);
    font-size: 14px;
  }
  .results-line.hot { border-left-color: var(--magenta); }
  .results-line .v { font-family: 'Orbitron', sans-serif; font-weight: 700; }

  /* ============ TUTORIAL TIPS ============ */
  .tip {
    position: absolute;
    bottom: 90px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--magenta);
    padding: 14px 24px;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--ink);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0 50%);
    z-index: 32;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 0 24px rgba(255, 45, 191, 0.3);
    animation: tip-bob 2s ease-in-out infinite;
  }
  @keyframes tip-bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-4px); }
  }
  .tip-key {
    display: inline-block;
    padding: 2px 8px;
    background: rgba(34, 255, 238, 0.15);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    margin: 0 2px;
  }

  /* ============ MOBILE / TOUCH ============ */
  #touch {
    position: absolute; inset: 0;
    z-index: 25;

  /* ---- Offline summary detail ---- */

<body>

<div id="app">
  <canvas id="canvas"></canvas>

<script>
"use strict";

/* =========================================================================
   NEON FACTORY RAID
   Hybrid auto-shooter + idle factory + extraction game
   ========================================================================= */

// ---------- UTILITIES ----------
const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const normalizeAngle = (a) => {
  while (a > Math.PI) a -= TAU;
  while (a < -Math.PI) a += TAU;
  return a;
};
const weightedChoice = (entries) => {
  // entries: [[item, weight], ...]
  let total = 0; for (const [, w] of entries) total += w;
  let r = Math.random() * total;
  for (const [item, w] of entries) { r -= w; if (r <= 0) return item; }
  return entries[entries.length - 1][0];
};
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const fmtNum = n => {
  n = Math.floor(n);
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
};
const fmtTime = sec => {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
};

        let r = await window.storage.get('nfr_save_v2').catch(()=>null);

// touch controls
function setupTouch() {
  const pad = document.getElementById('t-pad');
  const stick = document.getElementById('t-stick');
  const dash = document.getElementById('t-dash');
  const handle = (e) => {
    e.preventDefault();
    const t = e.touches[0] || e.changedTouches[0]; if (!t) return;
    const rect = pad.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const max = rect.width / 2 - 28;
    const d = Math.hypot(dx, dy);
    if (d > max) { dx = (dx / d) * max; dy = (dy / d) * max; }
    stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    G.touch.stickX = dx / max;
    G.touch.stickY = dy / max;
    G.touch.active = true;
  };
  pad.addEventListener('touchstart', handle, { passive: false });
  pad.addEventListener('touchmove', handle, { passive: false });
  pad.addEventListener('touchend', (e) => {
    e.preventDefault();
    G.touch.stickX = G.touch.stickY = 0;
    G.touch.active = false;
    stick.style.transform = `translate(-50%, -50%)`;
  }, { passive: false });
  dash.addEventListener('touchstart', (e) => { e.preventDefault(); G.touch.dashRequested = true; }, { passive: false });
}

// ---------- AUDIO (simple WebAudio synth) ----------
const Audio = {
  ctx: null,
  master: null,
  muted: false,
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.ctx.destination);
    } catch (e) { /* no audio */ }
  },
  shot() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'square'; o.frequency.value = 1400;
    o.frequency.exponentialRampToValueAtTime(400, t + 0.05);
    g.gain.value = 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.07);
  },
  hit() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 200;
    o.frequency.exponentialRampToValueAtTime(60, t + 0.12);
    g.gain.value = 0.18;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.14);
  },
  pickup() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'triangle'; o.frequency.value = 800;
    o.frequency.exponentialRampToValueAtTime(1600, t + 0.06);
    g.gain.value = 0.06;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.08);
  },
  core() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 3; i++) {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'triangle'; o.frequency.value = 600 + i * 200;
      o.frequency.exponentialRampToValueAtTime(1800, t + 0.15 + i * 0.04);
      g.gain.value = 0.05;
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18 + i * 0.04);
      o.connect(g); g.connect(this.master);
      o.start(t + i * 0.03); o.stop(t + 0.2 + i * 0.04);
    }
  },
  hurt() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 120;
    o.frequency.exponentialRampToValueAtTime(40, t + 0.25);
    g.gain.value = 0.22;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.31);
  },
  dash() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 200;
    o.frequency.exponentialRampToValueAtTime(900, t + 0.1);
    g.gain.value = 0.12;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.13);
  },
  powerup() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 5; i++) {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = 400 + i * 200;
      g.gain.value = 0.05;
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(g); g.connect(this.master);
      o.start(t + i * 0.04); o.stop(t + 0.34);
    }
  },
  extract() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 8; i++) {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 300 + i * 100;
      g.gain.value = 0.06;
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.connect(g); g.connect(this.master);
      o.start(t + i * 0.05); o.stop(t + 0.55);
    }
  },
  death() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 220;
    o.frequency.exponentialRampToValueAtTime(40, t + 1.2);
    g.gain.value = 0.3;
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.3);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 1.4);
  },
};

// ---------- PARTICLES ----------
class Particle {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.vx = opts.vx || (rand(-1, 1) * 200);
    this.vy = opts.vy || (rand(-1, 1) * 200);
    this.life = opts.life || rand(0.3, 0.8);
    this.max = this.life;
    this.size = opts.size || rand(2, 5);
    this.color = opts.color || '#22ffee';
    this.shrink = opts.shrink !== undefined ? opts.shrink : true;
    this.gravity = opts.gravity || 0;
    this.drag = opts.drag !== undefined ? opts.drag : 0.92;
    this.glow = opts.glow !== undefined ? opts.glow : true;
    this.shape = opts.shape || 'circle'; // circle, square, line
    this.ax = 0; this.ay = 0;
    this.spin = opts.spin || 0;
    this.rot = opts.rot || 0;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= Math.pow(this.drag, dt * 60);
    this.vy *= Math.pow(this.drag, dt * 60);
    this.vy += this.gravity * dt;
    this.rot += this.spin * dt;
    this.life -= dt;
    return this.life > 0;
  }
  draw(ctx) {
    const t = this.life / this.max;
    const s = this.shrink ? this.size * t : this.size;
    ctx.globalAlpha = clamp(t * 1.4, 0, 1);
    if (this.glow) { ctx.shadowColor = this.color; ctx.shadowBlur = 14; }
    ctx.fillStyle = this.color;
    if (this.shape === 'square') {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.restore();
    } else if (this.shape === 'line') {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = s;
      const len = Math.hypot(this.vx, this.vy) * 0.04;
      const ang = Math.atan2(this.vy, this.vx);
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - Math.cos(ang) * len, this.y - Math.sin(ang) * len);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, s, 0, TAU);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// Floating text (damage, combo)
class FloatText {
  constructor(x, y, text, opts = {}) {
    this.x = x; this.y = y;
    this.text = text;
    this.life = opts.life || 0.9;
    this.max = this.life;
    this.color = opts.color || '#ffc233';
    this.size = opts.size || 18;
    this.vy = opts.vy || -60;
    this.vx = opts.vx || rand(-20, 20);
    this.glow = opts.glow !== undefined ? opts.glow : true;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 80 * dt;
    this.life -= dt;
    return this.life > 0;
  }
  draw(ctx) {
    const t = this.life / this.max;
    ctx.globalAlpha = clamp(t * 1.4, 0, 1);
    ctx.font = `900 ${this.size}px Orbitron, sans-serif`;
    ctx.textAlign = 'center';
    if (this.glow) { ctx.shadowColor = this.color; ctx.shadowBlur = 12; }
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, this.x, this.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

const RARITY_WEIGHTS = { common: 70, rare: 25, epic: 5 };

function rollDraft(seenIds = new Set()) {
  const N = hasResearch('bonus_draft') ? 4 : 3;
  // pick N distinct upgrades, weighted
  const picked = [];
  const tried = new Set();
  while (picked.length < N && tried.size < UPGRADES.length * 2) {
    const rarity = weightedChoice(Object.entries(RARITY_WEIGHTS).map(([k, v]) => [k, v]));
    const opts = UPGRADES.filter(u => u.rarity === rarity && !picked.includes(u));
    if (opts.length === 0) { tried.add(rarity); continue; }
    const u = choice(opts);
    if (!picked.includes(u)) picked.push(u);
    tried.add(u.id);
  }
  while (picked.length < N) {
    const u = choice(UPGRADES);
    if (!picked.includes(u)) picked.push(u);
  }
  return picked;
}

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function rollDaily() {
  const day = Storage.data.daily;
  const today = todayKey();
  if (day.date === today) return; // already rolled
  // simple deterministic hash from date for daily quest+modifier
  let h = 0;
  for (let i = 0; i < today.length; i++) h = ((h << 5) - h + today.charCodeAt(i)) | 0;
  const qi = Math.abs(h) % DAILY_QUESTS.length;
  const mi = Math.abs(h >> 4) % DAILY_MODIFIERS.length;
  // streak bookkeeping
  const yesterdayD = new Date(Date.now() - 86400000);
  const yK = yesterdayD.getFullYear() + '-' + String(yesterdayD.getMonth()+1).padStart(2,'0') + '-' + String(yesterdayD.getDate()).padStart(2,'0');
  if (day.lastClaimDate === yK) {
    // streak continues if they claim today
  } else if (day.lastClaimDate && day.lastClaimDate !== today) {
    day.streak = 0;
  }
  day.date = today;
  day.questId = DAILY_QUESTS[qi].id;
  day.modifierId = DAILY_MODIFIERS[mi].id;
  day.questProgress = 0;
  day.questClaimed = false;
}

function getDailyQuest() {
  return DAILY_QUESTS.find(q => q.id === Storage.data.daily.questId) || DAILY_QUESTS[0];
}
function getDailyModifier() {
  return DAILY_MODIFIERS.find(m => m.id === Storage.data.daily.modifierId) || DAILY_MODIFIERS[0];
}
