<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Factory Tycoon</title>
<style>
:root{
  --bg:#030712;
  --panel:rgba(7,13,27,.86);
  --panel2:rgba(10,20,42,.94);
  --line:rgba(255,255,255,.13);
  --text:#edf7ff;
  --muted:#8aa4bd;
  --cyan:#37f5ff;
  --blue:#4697ff;
  --gold:#ffd24f;
  --orange:#ff9238;
  --green:#41ff9c;
  --pink:#ff4fd8;
  --purple:#9c6bff;
  --red:#ff4f6d;
}
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#030712;touch-action:none;cursor:grab}
canvas:active{cursor:grabbing}
#hud{position:fixed;left:16px;top:16px;z-index:20;display:flex;flex-wrap:wrap;gap:10px;pointer-events:none;max-width:calc(100vw - 32px)}
.pill{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:linear-gradient(180deg,rgba(14,28,56,.91),rgba(5,10,22,.88));border:1px solid var(--line);box-shadow:0 16px 38px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(12px);font-weight:950;letter-spacing:.01em;white-space:nowrap}
.pill small{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:900}
#topButtons{position:fixed;right:16px;top:16px;z-index:24;display:flex;gap:10px;align-items:flex-start}
.uiBtn{border:0;outline:0;border-radius:18px;padding:13px 16px;font-weight:950;letter-spacing:.01em;color:#03101b;cursor:pointer;box-shadow:0 16px 38px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.55);transition:transform .12s ease,filter .12s ease,opacity .12s ease;background:linear-gradient(135deg,#fff16d,#43ff9b 48%,#35d9ff)}
.uiBtn:hover{transform:translateY(-2px);filter:brightness(1.06)}
.uiBtn:active{transform:translateY(1px) scale(.99)}
.uiBtn:disabled{opacity:.6;cursor:default;transform:none;filter:grayscale(.2)}
#saveStatus{position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:18;padding:9px 13px;border-radius:999px;background:rgba(5,12,26,.52);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(10px);font-size:12px;font-weight:900;color:rgba(237,247,255,.72);pointer-events:none;opacity:0;transition:opacity .25s ease}
#saveStatus.visible{opacity:1}
#shopPanel{position:fixed;left:50%;bottom:112px;transform:translateX(-50%) translateY(22px);z-index:30;width:min(900px,calc(100vw - 28px));opacity:0;pointer-events:none;transition:opacity .16s ease,transform .16s ease;padding:16px;border-radius:28px;background:radial-gradient(circle at 14% 0%,rgba(55,245,255,.16),transparent 34%),linear-gradient(180deg,rgba(12,24,50,.96),rgba(5,10,22,.96));border:1px solid rgba(255,255,255,.15);box-shadow:0 34px 100px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(16px)}
#shopPanel.visible{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.panelHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
.panelHead h2{margin:0;font-size:24px;letter-spacing:-.04em;line-height:1.05}
.panelHead p{margin:6px 0 0;color:var(--muted);font-size:13px;font-weight:750}
#shopCash{flex:0 0 auto;padding:9px 12px;border-radius:999px;background:rgba(65,255,156,.12);border:1px solid rgba(65,255,156,.25);color:#baffd8;font-weight:950}
.shopGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.upgradeCard{position:relative;min-height:132px;text-align:left;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:linear-gradient(180deg,rgba(19,39,76,.94),rgba(7,15,32,.94));color:var(--text);padding:14px;cursor:pointer;overflow:hidden;box-shadow:0 16px 34px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.08);transition:transform .12s ease,border-color .12s ease,filter .12s ease,opacity .12s ease}
.upgradeCard:hover{transform:translateY(-2px);border-color:rgba(55,245,255,.42);filter:brightness(1.05)}
.upgradeCard:active{transform:translateY(1px) scale(.99)}
.upgradeCard:disabled{opacity:.43;cursor:default;transform:none;filter:grayscale(.3)}
.upgradeCard .icon{font-size:25px;margin-bottom:7px;filter:drop-shadow(0 0 10px rgba(55,245,255,.5))}
.upgradeCard .title{display:block;font-size:14px;font-weight:950;margin-bottom:5px;line-height:1.1}
.upgradeCard .meta{display:block;font-size:12px;color:var(--muted);font-weight:750;line-height:1.32;padding-right:4px}
.upgradeCard .cost{position:absolute;right:12px;bottom:12px;padding:6px 9px;border-radius:999px;background:rgba(65,255,156,.12);border:1px solid rgba(65,255,156,.23);color:#baffd8;font-weight:950;font-size:13px}
.upgradeCard.unlocked .cost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:rgba(237,247,255,.65)}
#adOverlay{position:fixed;inset:0;z-index:100;display:none;place-items:center;background:radial-gradient(circle at 50% 45%,rgba(255,79,216,.22),transparent 32%),rgba(1,4,12,.91);backdrop-filter:blur(12px)}
#adOverlay.visible{display:grid}
.adCard{width:min(540px,calc(100vw - 32px));padding:30px;border-radius:30px;text-align:center;background:linear-gradient(180deg,rgba(18,36,72,.98),rgba(5,10,22,.98));border:1px solid rgba(255,255,255,.15);box-shadow:0 36px 110px rgba(0,0,0,.7)}
.adCard .big{font-size:58px;margin-bottom:8px;filter:drop-shadow(0 0 18px rgba(255,79,216,.6))}
.adCard h1{margin:0 0 8px;font-size:29px;letter-spacing:-.04em}
.adCard p{margin:0 0 18px;color:var(--muted);font-weight:750}
.loader{height:11px;width:100%;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.loader div{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#ff4fd8,#37f5ff,#41ff9c);animation:loadAd 3s linear forwards}
@keyframes loadAd{to{width:100%}}
#frenzyEdge{position:fixed;inset:0;z-index:12;pointer-events:none;opacity:0;transition:opacity .22s ease;box-shadow:inset 0 0 52px rgba(255,79,216,.52),inset 0 0 105px rgba(55,245,255,.24)}
#frenzyEdge.visible{opacity:1;animation:frenzyPulse .9s ease-in-out infinite alternate}
@keyframes frenzyPulse{from{filter:brightness(.9)}to{filter:brightness(1.35)}}
#bannerAd{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:22;width:min(728px,calc(100vw - 24px));height:90px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px dashed rgba(255,255,255,.23);display:grid;place-items:center;color:rgba(237,247,255,.58);font-weight:950;letter-spacing:.06em;text-transform:uppercase;font-size:13px;pointer-events:none;backdrop-filter:blur(8px)}
#tip{position:fixed;left:50%;bottom:112px;transform:translateX(-50%);z-index:19;pointer-events:none;padding:9px 13px;border-radius:999px;background:rgba(5,12,26,.52);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(10px);font-size:12px;font-weight:900;color:rgba(237,247,255,.72);text-transform:uppercase;letter-spacing:.07em}
@media(max-width:920px){.shopGrid{grid-template-columns:1fr}.upgradeCard{min-height:84px}.panelHead h2{font-size:20px}.panelHead p{display:none}#shopPanel{bottom:104px;padding:12px}.upgradeCard .cost{bottom:10px}#topButtons{right:10px;top:auto;bottom:108px}.uiBtn{padding:12px 13px;font-size:13px}#tip{display:none}#hud{top:10px;left:10px;gap:6px}.pill{padding:8px 10px;font-size:13px}.pill small{font-size:10px}#bannerAd{height:76px;font-size:11px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="frenzyEdge"></div>
<div id="hud">
  <div class="pill"><small>Cash</small><span id="cashText">$0</span></div>
  <div class="pill"><small>Carry</small><span id="carryText">0 / 10</span></div>
  <div class="pill"><small>Drones</small><span id="botText">0</span></div>
  <div class="pill"><small>Gold</small><span id="goldText">Locked</span></div>
</div>
<div id="topButtons"><button id="adButton" class="uiBtn">📺 Ad: Frenzy Mode (30s)</button></div>
<div id="saveStatus">Game Saved</div>
<div id="tip">WASD / Arrows or drag to move</div>
<div id="shopPanel">
  <div class="panelHead">
    <div><h2>Neon Upgrade Terminal</h2><p>Stand in the terminal zone and invest cash to expand the factory loop.</p></div>
    <div id="shopCash">$0</div>
  </div>
  <div class="shopGrid">
    <button class="upgradeCard" id="speedBtn"><div class="icon">⚡</div><span class="title">Player Speed</span><span class="meta" id="speedMeta">Level 1</span><span class="cost" id="speedCost">$80</span></button>
    <button class="upgradeCard" id="capacityBtn"><div class="icon">🎒</div><span class="title">Carry Capacity</span><span class="meta" id="capacityMeta">Level 1</span><span class="cost" id="capacityCost">$120</span></button>
    <button class="upgradeCard" id="smelterBtn"><div class="icon">🔥</div><span class="title">Smelter Speed</span><span class="meta" id="smelterMeta">Level 1</span><span class="cost" id="smelterCost">$180</span></button>
    <button class="upgradeCard" id="botBuyBtn"><div class="icon">🤖</div><span class="title">Buy AI Drone</span><span class="meta" id="botMeta">0 workers</span><span class="cost" id="botCost">$350</span></button>
    <button class="upgradeCard" id="goldUnlockBtn"><div class="icon">🔓</div><span class="title">Unlock Gold Zone</span><span class="meta" id="goldMeta">Massive new resource chain</span><span class="cost" id="goldCost">$2,500</span></button>
  </div>
</div>
<div id="adOverlay">
  <div class="adCard">
    <div class="big">📺</div>
    <h1>Frenzy Ad Simulation</h1>
    <p>Simulating 30-second rewarded video ad...</p>
    <div class="loader"><div></div></div>
  </div>
</div>
<div id="bannerAd">Banner Ad Space (728x90)</div>
<script>
(() => {
'use strict';
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d',{alpha:false});
const cashText=document.getElementById('cashText');
const carryText=document.getElementById('carryText');
const botText=document.getElementById('botText');
const goldText=document.getElementById('goldText');
const shopPanel=document.getElementById('shopPanel');
const shopCash=document.getElementById('shopCash');
const adButton=document.getElementById('adButton');
const adOverlay=document.getElementById('adOverlay');
const frenzyEdge=document.getElementById('frenzyEdge');
const saveStatus=document.getElementById('saveStatus');
const buttons={speed:document.getElementById('speedBtn'),capacity:document.getElementById('capacityBtn'),smelter:document.getElementById('smelterBtn'),bot:document.getElementById('botBuyBtn'),gold:document.getElementById('goldUnlockBtn')};
const labels={speedMeta:document.getElementById('speedMeta'),capacityMeta:document.getElementById('capacityMeta'),smelterMeta:document.getElementById('smelterMeta'),botMeta:document.getElementById('botMeta'),goldMeta:document.getElementById('goldMeta'),speedCost:document.getElementById('speedCost'),capacityCost:document.getElementById('capacityCost'),smelterCost:document.getElementById('smelterCost'),botCost:document.getElementById('botCost'),goldCost:document.getElementById('goldCost')};
let W=1,H=1,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=Math.floor(innerWidth);H=Math.floor(innerHeight);canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',resize,{passive:true});resize();
const TAU=Math.PI*2;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}
function invLerp(a,b,v){return clamp((v-a)/(b-a),0,1)}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function rand(a,b){return a+Math.random()*(b-a)}
function choose(a){return a[Math.floor(Math.random()*a.length)]}
function money(v){return '$'+Math.floor(v).toLocaleString('en-US')}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}
function roundRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}
class Vec2{constructor(x=0,y=0){this.x=x;this.y=y}set(x,y){this.x=x;this.y=y;return this}copy(v){this.x=v.x;this.y=v.y;return this}add(v){this.x+=v.x;this.y+=v.y;return this}sub(v){this.x-=v.x;this.y-=v.y;return this}mul(s){this.x*=s;this.y*=s;return this}len(){return Math.hypot(this.x,this.y)}norm(){const l=this.len()||1;this.x/=l;this.y/=l;return this}clone(){return new Vec2(this.x,this.y)}}
class Camera{constructor(){this.x=0;this.y=0;this.shake=0;this.shakeX=0;this.shakeY=0}update(dt,target){const tx=clamp(target.x-W/2,0,Game.world.w-W);const ty=clamp(target.y-H/2,0,Game.world.h-H);const t=1-Math.pow(.0008,dt);this.x=lerp(this.x,tx,t);this.y=lerp(this.y,ty,t);if(this.shake>0){this.shake=Math.max(0,this.shake-dt*18);const s=this.shake*this.shake*.55;this.shakeX=rand(-s,s);this.shakeY=rand(-s,s)}else{this.shakeX=0;this.shakeY=0}}bump(a){this.shake=Math.max(this.shake,a)}wx(x){return x-this.x+this.shakeX}wy(y){return y-this.y+this.shakeY}screenToWorld(x,y){return{x:x+this.x-this.shakeX,y:y+this.y-this.shakeY}}on(x,y,p=180){return x>this.x-p&&y>this.y-p&&x<this.x+W+p&&y<this.y+H+p}}
class Particle{constructor(x,y,vx,vy,color,size,life,glow=0){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.size=size;this.life=life;this.max=life;this.glow=glow}}
class ParticleSystem{constructor(){this.items=[]}burst(x,y,color,n=10,power=120,glow=12){for(let i=0;i<n;i++){const a=Math.random()*TAU;const s=rand(power*.25,power);this.items.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,rand(2,5),rand(.35,.8),glow))}}trail(x,y,color){this.items.push(new Particle(x,y,rand(-18,18),rand(25,70),color,rand(2,4),rand(.25,.45),8))}update(dt){const a=this.items;for(let i=a.length-1;i>=0;i--){const p=a[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.04,dt);p.vy*=Math.pow(.04,dt);if(p.life<=0)a.splice(i,1)}}draw(){for(const p of this.items){if(!Game.camera.on(p.x,p.y,80))continue;const k=p.life/p.max;ctx.save();ctx.globalAlpha=k;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=p.glow*k;ctx.beginPath();ctx.arc(Game.camera.wx(p.x),Game.camera.wy(p.y),p.size*k,0,TAU);ctx.fill();ctx.restore()}}}
class FloatingText{constructor(x,y,text,color='#41ff9c',size=18){this.x=x;this.y=y;this.text=text;this.color=color;this.size=size;this.life=1;this.max=1;this.vy=-58;this.scale=1.2}update(dt){this.life-=dt;this.y+=this.vy*dt;this.vy*=Math.pow(.22,dt);this.scale=lerp(this.scale,1,1-Math.pow(.001,dt));return this.life>0}draw(){if(!Game.camera.on(this.x,this.y,120))return;const k=this.life/this.max;const x=Game.camera.wx(this.x),y=Game.camera.wy(this.y);ctx.save();ctx.globalAlpha=clamp(k,0,1);ctx.translate(x,y);ctx.scale(this.scale,this.scale);ctx.font=`950 ${this.size}px Inter,system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineWidth=5;ctx.strokeStyle='rgba(0,0,0,.7)';ctx.strokeText(this.text,0,0);ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=12*k;ctx.fillText(this.text,0,0);ctx.restore()}}
class Entity{constructor(x,y){this.x=x;this.y=y;this.dead=false;this.pop=0}update(dt){}draw(){}interactPop(a=.2){this.pop=Math.max(this.pop,a)}}
const ItemDefs={ironOre:{label:'Raw Iron',kind:'raw',smelter:'iron',color:'#4697ff',value:0,shape:'cube'},goldOre:{label:'Raw Gold',kind:'raw',smelter:'gold',color:'#ffd24f',value:0,shape:'pyramid'},ironIngot:{label:'Iron Ingot',kind:'ingot',color:'#37f5ff',value:28,shape:'rect'},goldIngot:{label:'Gold Ingot',kind:'ingot',color:'#ff9238',value:95,shape:'star'}};
class GroundItem extends Entity{constructor(x,y,type){super(x,y);this.type=type;this.def=ItemDefs[type];this.rot=rand(0,TAU);this.size=type==='goldOre'?16:14;this.age=rand(0,10);this.targeted=false;this.magnetCooldown=0}update(dt){this.age+=dt;this.rot+=dt*(this.type==='goldOre'?1.8:1.2)}draw(){if(!Game.camera.on(this.x,this.y,80))return;drawItemShape(this.type,Game.camera.wx(this.x),Game.camera.wy(this.y)+Math.sin(this.age*3)*1.5,this.size,1,this.rot)}}
class FlyingItem{constructor(type,x,y,target,getTarget,onArrive,curve=70,speed=2.3){this.type=type;this.x=x;this.y=y;this.sx=x;this.sy=y;this.target=target;this.getTarget=getTarget;this.onArrive=onArrive;this.t=0;this.curve=curve;this.speed=speed;this.rot=rand(0,TAU);this.dead=false}update(dt){this.t=Math.min(1,this.t+dt*this.speed);const e=easeInOut(this.t);const t=this.getTarget?this.getTarget():this.target;const mx=lerp(this.sx,t.x,e),my=lerp(this.sy,t.y,e)-Math.sin(this.t*Math.PI)*this.curve;this.x=mx;this.y=my;this.rot+=dt*6;if(this.t>=1){this.dead=true;this.onArrive&&this.onArrive()}}draw(){if(!Game.camera.on(this.x,this.y,80))return;drawItemShape(this.type,Game.camera.wx(this.x),Game.camera.wy(this.y),15,1+Math.sin(this.t*Math.PI)*.42,this.rot)}}
class ResourceNode extends Entity{constructor(x,y,type,unlocked=()=>true){super(x,y);this.type=type;this.unlocked=unlocked;this.spawnTimer=0;this.radius=type==='goldOre'?135:150;this.spawnInterval=type==='goldOre'?1.1:.58;this.max=type==='goldOre'?42:64;this.phase=rand(0,TAU)}countNearby(){let c=0;for(const it of Game.items)if(it.type===this.type&&dist(it.x,it.y,this.x,this.y)<this.radius*1.2)c++;return c}update(dt){if(!this.unlocked())return;this.phase+=dt;this.spawnTimer+=dt;while(this.spawnTimer>=this.spawnInterval&&this.countNearby()<this.max){this.spawnTimer-=this.spawnInterval;const a=Math.random()*TAU;const r=Math.sqrt(Math.random())*this.radius*.62;const x=this.x+Math.cos(a)*r;const y=this.y+Math.sin(a)*r;Game.items.push(new GroundItem(x,y,this.type));this.interactPop(.1)}}draw(){const active=this.unlocked();if(!Game.camera.on(this.x,this.y,this.radius+180))return;const color=this.type==='goldOre'?'#ffd24f':'#4697ff';drawZone(this.x,this.y,this.radius,active?color:'#555b6b',active?.09:.035,active?.33:.13,this.phase);const x=Game.camera.wx(this.x),y=Game.camera.wy(this.y);ctx.save();ctx.translate(x,y);const pop=1+this.pop;if(this.pop>0)this.pop*=.88;ctx.scale(pop,pop);drawShadow(0,38,86,24,.35);ctx.shadowColor=color;ctx.shadowBlur=active?24:0;ctx.fillStyle=active?(this.type==='goldOre'?'#6e5415':'#123c72'):'#252b38';ctx.beginPath();for(let i=0;i<8;i++){const a=(i/8)*TAU+Math.PI/8;const rr=i%2===0?58:44;const px=Math.cos(a)*rr,py=Math.sin(a)*rr*.82;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.fill();ctx.strokeStyle=active?color:'rgba(255,255,255,.18)';ctx.lineWidth=3;ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle=active?color:'rgba(255,255,255,.35)';ctx.font='950 44px Inter,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.type==='goldOre'?'Au':'Fe',0,2);ctx.restore();drawWorldLabel(active?(this.type==='goldOre'?'GOLD NODE':'IRON NODE'):'LOCKED GOLD NODE',this.x,this.y-this.radius-42,active?'Auto-spawns raw material':'Unlock Gold Zone at the terminal')}}

class Player extends Entity{constructor(x,y){super(x,y);this.vx=0;this.vy=0;this.baseSpeed=310;this.r=25;this.carry=[];this.stackTrail=[];this.phase=0;for(let i=0;i<50;i++)this.stackTrail.push({x,y,rot:0})}get speed(){return (this.baseSpeed+(Game.state.speedLevel-1)*38)*(Game.isFrenzy()?1.5:1)}get capacity(){return Game.isFrenzy()?9999:10+(Game.state.capacityLevel-1)*5}hasSpace(){return this.carry.length<this.capacity}update(dt){this.phase+=dt;const mv=Game.inputVector();const accel=1800;this.vx+=mv.x*accel*dt;this.vy+=mv.y*accel*dt;const max=this.speed;const l=Math.hypot(this.vx,this.vy);if(l>max){this.vx=this.vx/l*max;this.vy=this.vy/l*max}const friction=mv.len>.05?Math.pow(.16,dt):Math.pow(.012,dt);this.vx*=friction;this.vy*=friction;this.x+=this.vx*dt;this.y+=this.vy*dt;this.x=clamp(this.x,60,Game.world.w-60);this.y=clamp(this.y,60,Game.world.h-60);this.autoCollect(dt);this.depositRaw(dt);this.updateStackTrail(dt)}updateStackTrail(dt){const speed=Math.hypot(this.vx,this.vy);const nx=speed>1?-this.vx/speed:0,ny=speed>1?-this.vy/speed:-1;let tx=this.x+nx*28,ty=this.y+ny*28-18;for(let i=0;i<this.stackTrail.length;i++){const p=this.stackTrail[i];const follow=1-Math.pow(.0001,dt*(1.2+i*.05));const sway=Math.sin(this.phase*8+i*.75)*Math.min(9,speed/45);p.x=lerp(p.x,tx+sway,follow);p.y=lerp(p.y,ty-i*6,follow);p.rot=lerp(p.rot,Math.sin(this.phase*6+i)*.22+this.vx*.0009,follow);tx=p.x;ty=p.y+5}}autoCollect(dt){if(!this.hasSpace())return;let best=null,bd=Infinity,bi=-1;const range=128;for(let i=0;i<Game.items.length;i++){const it=Game.items[i];if(it.targeted)continue;const d=dist(this.x,this.y,it.x,it.y);if(d<range&&d<bd&&this.canCarryType(it.type)){best=it;bd=d;bi=i}}if(best){best.targeted=true;Game.items.splice(bi,1);Game.flying.push(new FlyingItem(best.type,best.x,best.y,null,()=>({x:this.x,y:this.y-28}),()=>{if(this.hasSpace()){this.carry.push(best.type);Game.particles.burst(this.x,this.y-20,ItemDefs[best.type].color,5,75,10)}},80,3.4))}}canCarryType(type){if(ItemDefs
